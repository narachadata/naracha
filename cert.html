  for(var i=0;i<n;i++){ var p=pt(i,R); ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(p[0],p[1]); ctx.strokeStyle='rgba(255,255,255,0.13)'; ctx.stroke(); }
  /* 눈금 숫자 */
  ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.font='600 '+(W*0.02)+'px '+F; ctx.textAlign='center';
  [20,40,60,80,100].forEach(function(v,ix){ ctx.fillText(String(v), cx, cy-R*(v/100)-4); });
  /* 데이터 폴리곤 */
  if(axes.length>=3){
    ctx.beginPath();
    axes.forEach(function(a,ix){ var p=pt(ix, R*Math.max(0.04,a.v/100)); if(ix===0)ctx.moveTo(p[0],p[1]); else ctx.lineTo(p[0],p[1]); });
    ctx.closePath();
    ctx.fillStyle='rgba(255,255,255,0.13)'; ctx.fill();
    ctx.strokeStyle='#ffffff'; ctx.lineWidth=3; ctx.lineJoin='round'; ctx.stroke();
    axes.forEach(function(a,ix){ var p=pt(ix, R*Math.max(0.04,a.v/100)); ctx.beginPath(); ctx.arc(p[0],p[1],4.5,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill(); });
  }
  /* 축 라벨 + 등급 문자 */
  function gLetter(v){ return v>=90?'A+':v>=80?'A':v>=70?'B':v>=60?'C':v>=40?'D':'F'; }
  ctx.font='700 '+(W*0.026)+'px '+F;
  axes.forEach(function(a,ix){ var p=pt(ix,R*1.22);
    ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.textAlign='center';
    ctx.fillText(a.name+' '+gLetter(a.v), p[0], p[1]+W*0.008);
  });
  /* 점수 요약 */
  var sy=pY+pH+H*0.052;
  ctx.textAlign='center';
  ctx.fillStyle='rgba(255,255,255,0.55)'; ctx.font='700 '+(W*0.028)+'px '+F;
  ctx.fillText('1차 예비평가  '+D.s1+'/50      2차 심사당일  '+D.s2+'/50', W/2, sy);
  ctx.fillStyle='#E4D3A1'; ctx.font='900 '+(W*0.06)+'px '+F;
  ctx.fillText('합계 '+D.tot+'점'+(D.pass?'  ·  합격':''), W/2, sy+H*0.052);
  /* 지도자 정보 */
  function irow(lbl,val,y){
    ctx.textAlign='left'; ctx.fillStyle='#8FA6C8'; ctx.font='700 '+(W*0.026)+'px '+F;
    ctx.fillText(lbl, W*0.12, y);
    ctx.textAlign='right'; ctx.fillStyle='#fff'; ctx.font='800 '+(W*0.032)+'px '+F;
    ctx.fillText(val, W*0.88, y);
  }
  ctx.strokeStyle='rgba(201,178,107,0.4)'; ctx.beginPath(); ctx.moveTo(W*0.12,sy+H*0.075); ctx.lineTo(W*0.88,sy+H*0.075); ctx.stroke();
  irow('지도자명', D.examiner||'나라차태권도 지도부', sy+H*0.115);
  irow('심사일', _certFmtD(D.acqDate)||'—', sy+H*0.155);
  irow('발급 번호', 'No. '+String(D.s.id).slice(-6), sy+H*0.195);
  ctx.textAlign='center'; ctx.fillStyle='rgba(201,178,107,0.75)'; ctx.font='700 '+(W*0.024)+'px '+F;
  ctx.fillText('나라차태권도 분당도장 · 운동-신경심리 관찰 기반 심사', W/2, H*0.965);
}

/* 링크 payload의 B(띠색)를 그대로 사용 */
function _certBeltDS(D){ return D._B || {type:'solid', main:'#E8EAED', bright:'#F2F4F7'}; }
function _decode(){
  var h=(location.hash||'').replace(/^#/,'');
  if(!h) return null;
  try{
    var b64=h.replace(/-/g,'+').replace(/_/g,'/');
    while(b64.length%4) b64+='=';
    var json=decodeURIComponent(escape(atob(b64)));
    return JSON.parse(json);
  }catch(e){ return null; }
}
function boot(){
  var p=_decode();
  var wrap=document.getElementById('wrap'), err=document.getElementById('err'), tt=document.getElementById('tt');
  if(!p || !p.n){ err.style.display='block'; wrap.style.display='none'; return; }
  var D={ name:p.n, gradeLabel:p.g||'', certGradeLabel:p.cg||p.g||'', acqDate:p.a||'', issueDate:p.i||'',
    examiner:p.e||'', gender:p.ge||'', poomType:!!p.pt, isDan:!!p.d, _B:p.B||null,
    photo:p.ph||'', s1:p.s1||0, s2:p.s2||0, tot:p.t||0, pass:(p.t||0)>=60,
    axes:p.ax||[], poomsae:p.ps||'', kick:p.k||'', breaking:p.br||'',
    s:{ id:p.id||'000000' }, belt:null };
  tt.textContent=D.name+' — '+D.gradeLabel+' 전자승급증';
  document.title=D.name+' 승급증 — 나라차태권도';
  var f=document.getElementById('cf'), b=document.getElementById('cb');
  certDrawBack(b,D);
  certDrawFront(f,D,function(){ certDrawFront(f,D); });
  var flipped=false;
  document.getElementById('flipWrap').onclick=function(){
    flipped=!flipped;
    document.getElementById('flip').style.transform=flipped?'rotateY(180deg)':'';
  };
}
window.addEventListener('DOMContentLoaded', boot);
window.addEventListener('hashchange', function(){ location.reload(); });
