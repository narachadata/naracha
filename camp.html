<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나라차X클래식리더 방학캠프</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root { --bg:#F5F3EE; --ink:#1B2233; --sub:#6B7280; --line:#E7E2D8; --card:#FFFFFF;
          --blue:#1E2A52; --blueSoft:#EBEEF6; --red:#B5343F; --redSoft:#F9ECED;
          --green:#1E7B3C; --greenSoft:#EAF6EE; --amber:#B07D1A; --amberSoft:#FBF3E2;
          --navy:#141C33; --navyLine:#28324F; --navyDim:#8C96AE; }
  * { box-sizing:border-box; -webkit-font-smoothing:antialiased; }
  body { margin:0; background:var(--bg); color:var(--ink);
         font-family:'Pretendard',-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
         letter-spacing:-0.02em; font-variant-numeric:tabular-nums; }
  .belt { height:4px; display:flex; }
  .belt div:first-child { flex:1; background:var(--red); }
  .belt div:last-child { flex:1; background:var(--blue); }
  .header { background:var(--navy); padding:13px 16px 0; }
  .hTop { display:flex; align-items:center; gap:11px; max-width:1560px; margin:0 auto; }
  .hBrand { flex:1; min-width:0; }
  .brandLine { font-size:12px; font-weight:700; color:#fff; letter-spacing:.02em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .brandLine .bx { color:var(--red); font-weight:800; margin:0 2px; }
  .brandSub { font-size:9.5px; color:var(--navyDim); letter-spacing:.14em; margin-top:1px; }
  .campName { display:inline-flex; align-items:center; gap:5px; margin-top:6px; background:#1E2947;
              border:1px solid var(--navyLine); color:#fff; font-family:inherit; font-weight:800;
              font-size:15.5px; padding:5px 11px; border-radius:9px; cursor:pointer; max-width:100%; }
  .campName .arw { color:var(--navyDim); font-size:11px; }
  .hRight { text-align:right; }
  .syncDot { display:inline-block; width:7px; height:7px; border-radius:99px; margin-right:5px; vertical-align:1px; }
  .syncTxt { font-size:10.5px; color:var(--navyDim); }
  .tabs { display:flex; gap:22px; overflow-x:auto; margin-top:10px; max-width:1560px; margin-left:auto; margin-right:auto; }
  .tab { flex:0 0 auto; padding:11px 2px 10px; font-size:14px; background:none; border:none;
         color:var(--navyDim); border-bottom:2.5px solid transparent; cursor:pointer; font-family:inherit; font-weight:600; white-space:nowrap; }
  .tab.on { color:#fff; font-weight:800; border-bottom-color:var(--red); }
  .wrap { max-width:1560px; margin:0 auto; padding:20px 22px 60px; }
  .grid2 { display:grid; grid-template-columns:repeat(auto-fit,minmax(430px,1fr)); gap:12px; align-items:start; }
  .grid2 > .card { margin-bottom:0; }
  .sheet { border-collapse:collapse; font-size:12px; white-space:nowrap; }
  .sheet th { padding:5px 6px; border-bottom:2px solid var(--line); border-right:1px solid #F0EDE6; font-weight:700; text-align:center; background:#FBFAF7; position:sticky; top:0; }
  .sheet td { padding:4px 6px; border-bottom:1px solid var(--line); border-right:1px solid #F4F1EA; text-align:center; }
  .sheet .lft { text-align:left; }
  .sheet .wk { border-left:2.5px solid var(--blue) !important; }
  .sheet .wkhead { border-bottom:none; padding:3px 6px; font-size:11px; font-weight:800; color:var(--blue); background:var(--blueSoft); }
  .modal { border-radius:20px; max-width:760px; margin:auto; }
  .modalBg { align-items:center; }
  .card { background:var(--card); border-radius:16px; padding:18px; margin-bottom:12px;
          box-shadow:0 1px 3px rgba(0,0,0,.04), 0 4px 12px rgba(0,0,0,.04); }
  .label { font-size:13px; font-weight:600; color:var(--sub); margin:10px 0 6px; display:block; }
  .input { width:100%; font-size:16px; padding:12px 14px; border:1.5px solid var(--line);
           border-radius:10px; background:#FAFAFC; outline:none; font-family:inherit; }
  .input:focus { border-color:var(--blue); background:#fff; }
  .chips { display:flex; gap:8px; flex-wrap:wrap; }
  .chip { padding:7px 13px; border-radius:10px; border:1.5px solid var(--line); background:#fff;
          font-size:13.5px; cursor:pointer; font-family:inherit; font-weight:500; }
  .chip.on { border-color:var(--blue); background:var(--blueSoft); color:var(--blue); font-weight:700; }
  .dchips { display:flex; gap:7px; overflow-x:auto; padding-bottom:6px; margin-bottom:10px; }
  .dchip { flex:0 0 auto; padding:8px 13px; border-radius:999px; font-size:12.5px; font-weight:700;
           border:1.5px solid var(--line); background:#fff; color:var(--sub); cursor:pointer; font-family:inherit; white-space:nowrap; }
  .dchip.on { background:var(--ink); border-color:var(--ink); color:#fff; }
  .btn { border:none; border-radius:12px; padding:13px 16px; font-size:15px; font-weight:700;
         cursor:pointer; font-family:inherit; color:#fff; background:var(--navy); }
  .btn.red { background:var(--red); } .btn.gray { background:#8A8F98; } .btn.green { background:var(--green); }
  .btn.line { background:#fff; color:var(--ink); border:1.5px solid var(--line); }
  .btn.full { width:100%; }
  .row { display:flex; gap:8px; }
  .row > * { flex:1; }
  .item { display:flex; justify-content:space-between; align-items:center; gap:8px;
          background:#fff; border:1.5px solid var(--line); border-radius:14px; padding:13px 14px; margin-bottom:8px; cursor:pointer; }
  .item.on { border-color:var(--green); background:var(--greenSoft); }
  .item .nm { font-weight:700; font-size:15.5px; }
  .item .sb { font-size:12px; color:var(--sub); margin-top:2px; }
  .mark { font-weight:800; font-size:16px; color:#D5D2C9; }
  .item.on .mark { color:var(--green); }
  .kpi { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:12px; }
  .kpi .card { padding:13px 8px; text-align:center; margin:0; }
  .kpi .v { font-size:15px; font-weight:800; margin-top:3px; }
  .kpi .l { font-size:11.5px; color:var(--sub); }
  .bar { height:14px; border-radius:99px; background:var(--blueSoft); overflow:hidden; }
  .bar > div { height:100%; background:var(--blue); border-radius:99px; }
  .small { font-size:12px; color:var(--sub); }
  h2 { font-size:17px; margin:4px 0 12px; }
  .fee { display:flex; justify-content:space-between; align-items:center; background:var(--blueSoft);
         border-radius:12px; padding:13px 15px; margin:12px 0; }
  .fee b { color:var(--blue); font-size:17px; }
  .modalBg { position:fixed; inset:0; background:rgba(20,25,35,.45); display:flex; align-items:flex-end; justify-content:center; z-index:50; }
  .modal { background:#fff; width:100%; max-width:680px; max-height:88vh; overflow-y:auto;
           border-radius:20px 20px 0 0; padding:20px 18px 30px; }
  .empty { text-align:center; color:var(--sub); font-size:13.5px; padding:26px 0; }
  .tag { font-size:11px; font-weight:700; padding:2px 8px; border-radius:99px; background:var(--amberSoft); color:var(--amber); }



  /* ── 출석부 색 구분 ── */
  .sheet th.hdrInfo, .sheet td.hdrInfo { background:#FFF6CC !important; }   /* 인적사항 제목 */
  .sheet th.hdrMon,  .sheet td.hdrMon  { background:#D4E9CC !important; }   /* 월요일 */
  .sheet th.hdrDay,  .sheet td.hdrDay  { background:#DFE9F5 !important; }   /* 화~금 */
  .sheet th.hdrSum,  .sheet td.hdrSum  { background:#FBDDE0 !important; }   /* 집계 */
  .sheet tr.clsA td.idc { background:#E3EDFB !important; }  /* A반 인적사항 */
  .sheet tr.clsB td.idc { background:#E4F3E7 !important; }  /* B반 인적사항 */
  .sheet tr.stripe td.idc { filter:brightness(0.985); }
  .sheet tbody td.cAbs  { background:#EDEBE7 !important; color:#9A958C !important; }  /* 결석·미체크 */
  .sheet tbody td.cOn   { background:#1E7B3C !important; color:#fff !important; }     /* 출석 */
  .sheet tbody td.cNo   { background:#C0392B !important; color:#fff !important; }     /* 명시 결석 */
  .sheet tbody td.cPlan { background:#F7FAFF !important; color:#96A2B8 !important; }  /* 배치 예정 */
  .sheet tbody td.cHol, .sheet th.cHol  { background:#E4E0D8 !important; color:#A9A296 !important; }  /* 휴일 */
  .sheet tbody td.warn  { background:#FFF4D6 !important; }      /* 레벨테스트 필요 */
  .sheet tbody td.mkCell{ background:#FDE7E9 !important; color:#B5343F !important; font-weight:800; }
  .sheet tbody tr.sumRow td { background:#F3F1EA !important; font-weight:800; }
  .sheet td.nameCell { position:sticky; left:0; z-index:1; }
  .sheet th.hdrInfo.nameCell { position:sticky; left:0; z-index:3; }
  .sheet tr:hover td:not(.idc) { filter:brightness(0.97); }
  /* ── 이름 검색 ── */
  .findBar { position:fixed; top:0; left:0; right:0; z-index:120; background:var(--navy);
             border-bottom:2px solid var(--red); padding:10px 18px; display:flex; align-items:center; gap:12px;
             box-shadow:0 6px 24px rgba(0,0,0,.28); }
  .findBar input { flex:0 0 320px; padding:9px 13px; border-radius:9px; border:1.5px solid var(--navyLine);
                   background:#1E2947; color:#fff; font-size:15px; font-family:inherit; outline:none; }
  .findBar input:focus { border-color:var(--red); }
  .findBar .res { color:var(--navyDim); font-size:13px; }
  .findBar .hit { display:inline-block; background:#1E2947; border:1px solid var(--navyLine); color:#fff;
                  border-radius:8px; padding:6px 11px; font-size:13px; cursor:pointer; margin-right:6px; }
  .findBar .hit:hover { border-color:var(--red); }
  .findBar .x { margin-left:auto; background:none; border:none; color:var(--navyDim); font-size:20px; cursor:pointer; }
  @keyframes neonPulse {
    0%,100% { box-shadow:0 0 4px #FFE066, 0 0 12px #FFD11A, 0 0 22px #FFB800; background:#FFF6D6; }
    50%     { box-shadow:0 0 10px #FFF3B0, 0 0 26px #FFD11A, 0 0 44px #FFB800; background:#FFFBEA; }
  }
  .neon { animation:neonPulse 1s ease-in-out 4; border-radius:7px;
          outline:2.5px solid #FFC400; position:relative; z-index:5; }
  .neonTxt { color:#8A5A00 !important; font-weight:900 !important; text-shadow:0 0 8px #FFD11A; }
  /* ── A4 일일 출석부 인쇄 ── */
  #printArea { display:none; }
  @media print {
    body > *:not(#printArea) { display:none !important; }
    #printArea { display:block !important; }
    @page { size:A4 portrait; margin:14mm 13mm; }
  }
  .pSheet { font-family:'Pretendard','Malgun Gothic',sans-serif; color:#000; }
  .pHead { text-align:center; border-bottom:2.5px solid #000; padding-bottom:7px; margin-bottom:4px; }
  .pTitle { font-size:15pt; font-weight:800; letter-spacing:-0.03em; }
  .pOrg { font-size:9pt; color:#333; margin-top:3px; letter-spacing:.02em; }
  .pMeta { display:flex; justify-content:space-between; align-items:flex-end; margin:8px 0 6px; font-size:10.5pt; }
  .pMeta .d { font-weight:800; font-size:12pt; }
  .pMeta .n { font-size:9.5pt; color:#333; }
  .pTbl { width:100%; border-collapse:collapse; font-size:9.5pt; }
  .pTbl th { border:1px solid #000; background:#EFEFEF; padding:4px 3px; font-weight:700; text-align:center; }
  .pTbl td { border:1px solid #666; padding:3.5px 4px; text-align:center; height:19px; }
  .pTbl td.l { text-align:left; }
  .pTbl .clsRow td { background:#F5F5F5; font-weight:800; text-align:left; padding:4px 6px; border-top:1.6px solid #000; }
  .pTbl .subRow td { background:#FAFAFA; font-weight:700; }
  .pSign { display:flex; justify-content:flex-end; gap:26px; margin-top:12px; font-size:9.5pt; }
  .pSign span { border-bottom:1px solid #000; min-width:92px; display:inline-block; }
  .pFoot { margin-top:9px; font-size:8pt; color:#555; text-align:center; }
</style>
</head>

function allItems(cats){
  var menu=MENU(), out=[];
  cats.forEach(function(c){ if(menu[c]) menu[c].items.forEach(function(it){
    if(!out.some(function(x){return x.n===it.n;})) out.push({n:it.n,p:it.p,cat:c});
  }); });
  return out;
}
function findItem(name){
  var menu=MENU(), r=null;
  Object.keys(menu).forEach(function(c){ menu[c].items.forEach(function(it){ if(it.n===name && !r) r={n:it.n,p:it.p,cat:c}; }); });

function migrate(o){  /* 예전 단일 캠프 구조 → 새 구조 자동 변환 */
  if(o && o.camps) return o;
  if(o && o.set) return { meta:o.meta||{updatedAt:Date.now()},

}

var syncTimer=null;
function setSync(status, txt){
  UI.syncStatus=status;
  var dot=document.getElementById("syncDot"), t=document.getElementById("syncTxt");
  if(!dot) return;
  dot.style.background = status==="ok" ? "#1E7B3C" : status==="err" ? "#C0392B" : status==="busy" ? "#B07D1A" : "#C7C7CC";
  t.textContent = txt;
  /* 오류 상태면 클릭해서 접속키를 다시 넣을 수 있게 */
  var box=t.parentNode;
  if(box){
    if(status==="err"){
      box.style.cursor="pointer";
      box.title="클릭해서 접속키 다시 입력";
      box.onclick=function(){ if(confirm("접속키를 다시 입력하시겠습니까?\n(입력한 자료는 그대로 유지됩니다)")) authFail("접속키를 다시 입력해 주세요."); };
    } else { box.style.cursor=""; box.title=""; box.onclick=null; }
  }
}
function campSyncSoon(){ clearTimeout(syncTimer); syncTimer=setTimeout(campSync, 1200); }
function campSync(){
  if(!accessKey()){ setSync("idle","접속키 없음 (설정 탭에서 입력)"); return; }
  setSync("busy","저장 중…");
  var s=JSON.stringify(DB); var rows=[["JSON"]];
  for(var k=0;k<s.length;k+=45000) rows.push([s.slice(k,k+45000)]);
  fetch(GSHEET_URL, {method:"POST", body:JSON.stringify({key:accessKey(), store:STORE, rows:rows})})
    .then(function(r){ return r.text(); })
    .then(function(t){
      if(t && t.indexOf('"AUTH"')>=0){ authFail("저장 권한이 없습니다. 접속키를 다시 입력해 주세요."); return; }
      setSync("ok","동기화 완료 "+new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"}));
    })
    .catch(function(){ setSync("err","저장 실패 (인터넷 확인)"); });
}
function campPull(first){
  if(!accessKey()){ setSync("idle","접속키 없음 (설정 탭에서 입력)"); return; }
  setSync("busy","불러오는 중…");
  fetch(GSHEET_URL+"?key="+encodeURIComponent(accessKey())+"&store="+STORE)
    .then(function(r){ return r.json(); })
    .then(function(rows){
      if(rows && rows.error==="AUTH"){ authFail("서버에서 접속키를 확인하지 못했습니다. 키가 변경되었을 수 있습니다."); return; }
      if(!rows || rows.length<2){ setSync("ok","클라우드 비어있음 (첫 저장 대기)"); if(first&&DB.camps.some(function(c){return c.students.length;})) campSyncSoon(); return; }
      var joined="";
      for(var i=0;i<rows.length;i++){
        if(rows[i][0]==="JSON" && i+1<rows.length){
          for(var j=i+1;j<rows.length;j++) joined += (rows[j][0]!=null?String(rows[j][0]):"");
          break;
        }
      }
      var remote=null; try{ remote=migrate(JSON.parse(joined)); }catch(e){}
      if(remote && remote.meta && remote.meta.updatedAt > (DB.meta.updatedAt||0)){
        DB=remote; pickCamp(); saveLocalOnly(); render();
        setSync("ok","최신 자료 반영 완료");
      } else {
        setSync("ok","동기화 완료");
        if(remote && DB.meta.updatedAt > remote.meta.updatedAt) campSyncSoon();
      }
    })
    .catch(function(){ setSync("err","불러오기 실패"); });
}

/* ================= 날짜/요금 ================= */
/* 지역(한국) 시간 기준 YYYY-MM-DD — toISOString은 UTC라 하루 밀리므로 사용 금지 */
function ymd(d){
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function todayStr(){ return ymd(new Date()); }
function campDates(){
  var out=[], s=CAMP.set.start, e=CAMP.set.end;
  if(!s||!e) return out;
  var d=new Date(s+"T00:00:00"), end=new Date(e+"T00:00:00");
  while(d<=end){ var w=d.getDay(); if(w>=1&&w<=5) out.push(ymd(d)); d.setDate(d.getDate()+1); }
  return out;
}
/* 캠프 날짜를 주 단위로 묶기 (월~금, 주말 제외) */
function weekGroups(){
  var ds=campDates(), gs=[], cur=null, lastWk=null;
  ds.forEach(function(d){
    var dt=new Date(d+"T00:00:00");
    var th=new Date(dt); th.setDate(dt.getDate()+(4-((dt.getDay()+6)%7)));  /* 그 주의 목요일 */
    var wk=th.getFullYear()+"-"+th.getMonth()+"-"+Math.floor(th.getDate()/7);
    if(wk!==lastWk){ cur={ dates:[] }; gs.push(cur); lastWk=wk; }
    cur.dates.push(d);
  });
  gs.forEach(function(g,i){ g.label=(i+1)+"주차"; });
  return gs;
}
function weekStarts(){   /* 각 주 첫날 목록 (구분선 표시용) */
  var out={}; weekGroups().forEach(function(g,i){ if(i>0) out[g.dates[0]]=1; });
  return out;
}
function fmtD(s){ var d=new Date(s+"T00:00:00"); return (d.getMonth()+1)+"/"+d.getDate()+"("+"일월화수목금토"[d.getDay()]+")"; }
/* 요금 계산: 수업료(할인 적용) + 식비(할인 없음) + 차량비 */
function feeParts(s){
  /* billDays(청구 일수)가 있으면 그것으로 청구, 없으면 등록 일수 사용
     — 전 일정 청구 후 결석분 환불하는 운영 방식 지원 */
  var r=RATE(), p=PKG[s.pkg];
  var days=(s.billDays!==undefined && s.billDays!=="" && Number(s.billDays)>0) ? Number(s.billDays) : (Number(s.days)||0);
  if(!p||!days) return { tuition:0, meal:0, bus:0, total:0, discApplied:0, blocked:false };
  var per=0; p.parts.forEach(function(k){ per+=Number(r[k])||0; });
  /* 규정: 기준 일수 미만이면 할인 미적용 (청구 자동 계산에만 적용) */
  var blocked = days < (Number(r.minDays)||0);
  var d = blocked ? 0 : (Number(s.disc)||0);
  var tuition = Math.round(per*(1-d))*days;
  var meal = p.meal ? (Number(r.meal)||0)*days : 0;
  /* 차량비: 캠프 1회 정액 (형제는 50%) — 실제 운영 기준 */
  var bus=0;
  if(s.bus){
    var key = s.bus==="b1"?"bus1":s.bus==="b2"?"bus2":"bus3";
    bus = Number(r[key])||0;
    if(s.busHalf) bus = Math.round(bus*0.5);
  }
  return { tuition:tuition, meal:meal, bus:bus, total:tuition+meal+bus, discApplied:d, blocked:blocked };
}
function calcFee(s){ return feeParts(s).total; }
/* 조정 내역(환불·추가등록 등): s.adj = [{t:"환불"|"추가", n:"사유", v:금액(음수 가능)}] */
function ADJ(s){ if(!s.adj) s.adj=[]; return s.adj; }
function adjTotal(s){ var t=0; ADJ(s).forEach(function(a){ t+=Number(a.v)||0; }); return t; }
/* 납부 기록: s.pays = [{d:날짜, v:금액, n:메모}] — 여러 번 분할 납부 지원 */
function PAYS(s){ if(!s.pays) s.pays=[]; return s.pays; }
function paidTotalOf(s){ var t=0; PAYS(s).forEach(function(p){ t+=Number(p.v)||0; }); return t; }
function balanceOf(s){ return billOf(s).total - paidTotalOf(s); }
/* 청구금액(수업료+식비) / 차량비 / 조정 / 총금액 */
function billOf(s){
  var p=feeParts(s);
  var charge=p.tuition+p.meal;           /* 청구금액 (자동 계산) */
  /* 특수 사정으로 금액을 직접 정한 경우 그 값을 사용 */
  if(s.chargeSet!==undefined && s.chargeSet!=="" && Number(s.chargeSet)>0) charge=Number(s.chargeSet);
  var adj=adjTotal(s);                   /* 환불(-) · 추가등록(+) */
  return { charge:charge, bus:p.bus, adj:adj, total:charge+adj+p.bus, paid:!!s.paid, blocked:p.blocked };
}

/* ════════ 캠프생 이력 (캠프 간 동일인 매칭) ════════
   매칭 기준: ① 전화 뒤 8자리 ② 이름+생일 ③ 이름(공백·대소문자 무시) */
/* 매칭 규칙:
   ① 기본 묶음은 이름(공백·대소문자·끝의 b 무시)
   ② 같은 이름 안에서는 생일이 같으면 동일인, 생일이 다르면 다른 사람
      (전화는 형제가 공유하므로 이름이 다르면 절대 합치지 않음)
   ③ 생일 정보가 없는 기록은 원래 표기 이름(b 포함)이 같은 쪽에 붙임 */
function nkey(s){ return (s.name||"").replace(/\s/g,"").toLowerCase().replace(/[bB]$/,""); }
function rawname(s){ return (s.name||"").replace(/\s/g,"").toLowerCase(); }
function phone8(s){ var d=(s.phone||"").replace(/\D/g,""); return d.length>=8?d.slice(-8):""; }
function samePerson(a,b){
  if(nkey(a)!==nkey(b)) return false;
  if(a.birth && b.birth) return a.birth===b.birth;         /* 생일이 최우선 판정 */
  if(rawname(a)===rawname(b)) return true;                  /* 표기(b 포함)까지 같으면 동일 */
  var pa=phone8(a), pb=phone8(b);
  return !!(pa && pb && pa===pb);                           /* 표기 다르면 전화로만 연결(이유진↔이유진b) */
}
function buildHistory(){
  var recs=[];
  DB.camps.forEach(function(c){ (c.students||[]).forEach(function(s){ recs.push({camp:c, s:s}); }); });
  var clusters=[];
  recs.forEach(function(r){
    var hit=null;
    for(var i=0;i<clusters.length && !hit;i++){
      for(var j=0;j<clusters[i].length;j++){
        if(samePerson(clusters[i][j].s, r.s)){ hit=clusters[i]; break; }
      }
    }
    if(hit) hit.push(r); else clusters.push([r]);
  });
  var out=[];
  clusters.forEach(function(g){
    g.sort(function(a,b){ return (a.camp.set.start||"").localeCompare(b.camp.set.start||""); });
    var last=g[g.length-1].s;
    out.push({ name:last.name, birth:lastNonEmptyS(g,"birth"), phone:lastNonEmptyS(g,"phone"),
               school:lastNonEmptyS(g,"school"), grade:last.grade||"", recs:g,
               level:lastNonEmptyS(g,"level"), rlid:lastNonEmptyS(g,"rlid") });
  });
  out.sort(function(a,b){ return b.recs.length-a.recs.length || a.name.localeCompare(b.name,"ko"); });
  return out;
}
function lastNonEmptyS(recs,f){
  for(var i=recs.length-1;i>=0;i--){ if(recs[i].s[f]) return recs[i].s[f]; }
  return "";
}
function historyOf(stu){
  var out=[];
  DB.camps.forEach(function(c){
    (c.students||[]).forEach(function(s){
      if(s===stu) return;
      if(samePerson(stu,s)) out.push({camp:c, s:s});
    });
  });
  out.sort(function(a,b){ return (a.camp.set.start||"").localeCompare(b.camp.set.start||""); });
  return out;
}
function campAttended(rec){ /* 해당 캠프에서 실제 출석(과거는 배치=출석) 일수 */
  var n=0, c=rec.camp, s=rec.s;
  Object.keys(c.att||{}).forEach(function(d){ if(c.att[d][s.id]) n++; });
  return n || (s.plan||[]).length;
}

/* ════════ 출석부 (A/B반 · 배치 · 보강) ════════

/* 출석 상태: 1=출석, 2=결석(명시), 없음=미체크 */
function attState(sid,d){ var v=(CAMP.att[d]||{})[sid]; return v===2?2:(v?1:0); }
function tapCell(id,d){
  var day=CAMP.att[d]||{};

  if(cur===0) day[id]=1;        /* 1번 클릭 → 출석 */
  else if(cur===1) day[id]=2;   /* 2번 클릭 → 결석 */
  else delete day[id];          /* 3번 클릭 → 지움 */
  CAMP.att[d]=day; saveLocal(); render();
}

function toggleCol(d, ev){
  var C=COL(), ds=campDates(), i=ds.indexOf(d);
  if(i<0) return;
  var mod = ev && (ev.ctrlKey || ev.metaKey);   /* Ctrl(윈도우) / ⌘·Ctrl(맥) */
  if(C[d]){
    if(mod){ for(var j=0;j<=i;j++) delete C[ds[j]]; }   /* 왼쪽 접힌 날짜 모두 펼침 */
    else delete C[d];                                   /* 이 날짜만 펼침 */
  } else {
    for(var k=0;k<=i;k++) C[ds[k]]=1;                   /* 이 날짜까지 접기 */
  }

}

function planOf(s){ return s.plan||(s.plan=[]); }
function plannedCnt(s){ return planOf(s).filter(function(d){ return campDates().indexOf(d)>=0; }).length; }
function actualCnt(s){ var n=0; campDates().forEach(function(d){ if(attState(s.id,d)===1) n++; }); return n; }
/* 미배치 = 등록 일수 - 배치된 일수 (추가 등록 시 양수가 되어 경고) */
function unplaced(s){ return (Number(s.days)||0) - plannedCnt(s); }
/* 보강 필요 = 배치됐지만 결석한 날 (지난 날짜만 집계) */
function makeupCnt(s){
  var today=todayStr(), n=0;
  planOf(s).forEach(function(d){
    if(campDates().indexOf(d)<0 || isHol(d)) return;      /* 휴일은 보강 대상 아님 */
    var st=attState(s.id,d);
    if(st===2) n++;                                        /* 명시적 결석 */
    else if(st===0 && d<today) n++;                        /* 지난 날 미체크 = 결석 */
  });
  return n;
}

function saveSheetFile(body, filename){
  var css=''+
    '@page{size:A4 portrait;margin:14mm 13mm}'+
    'body{font-family:"Malgun Gothic","맑은 고딕",sans-serif;color:#000;margin:0;padding:14px}'+
    '.pHead{text-align:center;border-bottom:2.5px solid #000;padding-bottom:7px;margin-bottom:4px}'+
    '.pTitle{font-size:15pt;font-weight:800}.pOrg{font-size:9pt;color:#333;margin-top:3px}'+
    '.pMeta{display:flex;justify-content:space-between;align-items:flex-end;margin:8px 0 6px;font-size:10.5pt}'+
    '.pMeta .d{font-weight:800;font-size:12pt}.pMeta .n{font-size:9.5pt;color:#333}'+
    '.pTbl{width:100%;border-collapse:collapse;font-size:9.5pt}'+
    '.pTbl th{border:1px solid #000;background:#EFEFEF;padding:4px 3px;font-weight:700;text-align:center}'+
    '.pTbl td{border:1px solid #666;padding:3.5px 4px;text-align:center;height:19px}'+
    '.pTbl td.l{text-align:left}'+
    '.pTbl .clsRow td{background:#F5F5F5;font-weight:800;text-align:left;padding:4px 6px;border-top:1.6px solid #000}'+
    '.pTbl .subRow td{background:#FAFAFA;font-weight:700}'+
    '.pSign{display:flex;justify-content:flex-end;gap:26px;margin-top:12px;font-size:9.5pt}'+
    '.pSign span{border-bottom:1px solid #000;min-width:92px;display:inline-block}'+
    '.pFoot{margin-top:9px;font-size:8pt;color:#555;text-align:center}';
  var html='<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">'+
    '<title>'+esc(filename)+'</title><style>'+css+'</style></head><body>'+body+'</body></html>';
  try{
    var blob=new Blob(["\uFEFF"+html],{type:"text/html;charset=utf-8"});
    var a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=filename+".html";
    document.body.appendChild(a); a.click();
    setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(a.href); }, 500);
  }catch(e){ alert("다운로드에 실패했습니다. ‘인쇄 / PDF 저장’을 이용해 주세요."); }
}

/* ---- 식사: 반찬 주문 · 금액 자동 계산 ----
   저장 형태: CAMP.meals[날짜] = { order:{ "카테고리|반찬명": 수량, ... }, note:"", cost:직접입력(선택) } */
function mealDay(d){ var m=CAMP.meals[d||UI.date]; if(!m) m={}; if(!m.pick) m.pick={}; return m; }

/* 하루 식비: 특식이면 (1인 단가 × 인원), 아니면 각 칸 (단가 × 수량) 합계.
   실제 지출액을 직접 입력하면 그 값이 우선. */
function mealTotal(d){
  var m=CAMP.meals[d]; if(!m) return 0;
  if(m.cost!==undefined && m.cost!=="" && m.cost!==null) return Number(m.cost)||0;
  if(m.special) return Math.round((Number(m.spPer)||0) * (Number(m.spCnt)||0));
  var sum=0;
  SLOTS.forEach(function(sl){
    var pk=m.pick[sl.key]; if(!pk||!pk.n) return;
    var it=findItem(pk.n); var price = (pk.p!==undefined&&pk.p!=="") ? Number(pk.p) : (it?Number(it.p)||0:0);
    sum += price * (Number(pk.q)||0);
  });
  return sum;
}
function mealAllTotal(){ var t=0; campDates().forEach(function(d){ t+=mealTotal(d); }); return t; }
function mealSummary(d){
  var m=CAMP.meals[d]; if(!m) return "";
  if(m.special) return "특식" + (m.spNote?" ("+m.spNote+")":"");
  if(!m.pick) return "";
  var out=[]; SLOTS.forEach(function(sl){ var pk=m.pick[sl.key]; if(pk&&pk.n) out.push(pk.n+(pk.q?" "+pk.q:"")); });
  return out.join(" · ");
}
function mealPeople(){ var t=0; campDates().forEach(function(d){ var m=CAMP.meals[d]; t += m ? (Number(m.people)||0) : 0; }); return t; }
function campMealTotal(c,d){
  var m=c.meals[d]; if(!m) return 0;
  if(m.cost!==undefined && m.cost!=="" && m.cost!==null) return Number(m.cost)||0;
  if(m.special) return Math.round((Number(m.spPer)||0)*(Number(m.spCnt)||0));
  if(!m.pick) return 0;
  var sum=0;
  SLOTS.forEach(function(sl){ var pk=m.pick[sl.key]; if(!pk||!pk.n) return;
    var it=findItem(pk.n); var price=(pk.p!==undefined&&pk.p!=="")?Number(pk.p):(it?Number(it.p)||0:0);
    sum += price*(Number(pk.q)||0); });
  return sum;
}

function pickDish(slot,name){
  var m=mealDay();
  if(!name){ delete m.pick[slot]; }
  else { var prev=m.pick[slot]||{}; m.pick[slot]={ n:name, q:prev.q||"", p:prev.p, note:prev.note||"" }; }
  CAMP.meals[UI.date]=m; saveLocal(); render();
}
function pickField(slot,field,v){
  var m=mealDay(); if(!m.pick[slot]) return;
  m.pick[slot][field]=v; CAMP.meals[UI.date]=m; saveLocal(); render();
}
function addDish(cat){
  var n=prompt("추가할 반찬 이름");
  if(!n||!n.trim()) return;
  var p=prompt("단가 (원). 나중에 입력하려면 비워두세요","0");
  MENU()[cat].items.push({ n:n.trim(), p:Number(p)||0 });
  saveLocal(); render();
}
function setMeal(k,v){ var m=mealDay(); m[k]=v; CAMP.meals[UI.date]=m; saveLocal(); render(); }

function exportCSV(){
  var e=function(v){ return '"'+String(v==null?"":v).replace(/"/g,'""')+'"'; };
  var ds=campDates(), R=[];
  R.push([CAMP.set.name+" 백업", new Date().toLocaleString("ko-KR")]); R.push([]);
  R.push(["[캠프생 명단]"]);
  R.push(["이름","학년","학교","성별","보호자","연락처","패키지","일수","할인구분","수업료","식비","차량구간","차량비","총액","탑승장소","탑승시간","메모"]);
  CAMP.students.forEach(function(s){
    var p=feeParts(s), bl="";
    BUS.forEach(function(b){ if(b[0]===s.bus) bl=b[1]; });
    R.push([s.name,s.grade,s.school,s.gender,s.guardian,s.phone,PKG[s.pkg].label,s.days,
      ((s.discLabel||((s.disc*100)+"%"))),
      p.tuition,p.meal,bl+(s.busHalf?" (형제50%)":""),p.bus,p.total,s.stop,s.time,s.memo]);
  });
  R.push([]); R.push(["[출석부]"]);
  ["A","B"].forEach(function(c){
    var lst=clsList(c); if(!lst.length) return;
    R.push([c+"반 ("+(c==="A"?"10시 체육→11시 영어":"10시 영어→11시 체육")+")"]);
    R.push(["번","이름","학년","차량"].concat(ds.map(fmtD)).concat(["출석계","등록","배치","보강"]));
    lst.forEach(function(s){
      var marks=ds.map(function(d){
        if(isHol(d)) return "휴";
        var st=attState(s.id,d);
        return st===1?1:st===2?"결":((s.plan||[]).indexOf(d)>=0?"·":"");
      });
      R.push([s.no||"",s.name,s.grade,(s.bus?"O":"")].concat(marks)
        .concat([actualCnt(s),s.days,plannedCnt(s),makeupCnt(s)]));
    });
    R.push(["","일자별 합계","",""].concat(ds.map(function(d){
      return isHol(d)?"휴일":lst.filter(function(s){ return attState(s.id,d)===1; }).length; })));
    R.push([]);
  });
  R.push([]); R.push(["[차량 운행표]"]);
  ROUTES().forEach(function(rt){
    R.push([rt.name, rt.dir]);
    R.push(["시간","승하차 장소","학년","이름"].concat(ds.map(fmtD)).concat(["탑승계"]));
    rt.stops.forEach(function(st){
      if(!st.name){ R.push([st.t,st.place]); return; }
      var marks=ds.map(function(d){ return st.sid&&(CAMP.board[d]||{})[st.sid]?1:""; });
      R.push([st.t,st.place,st.grade,st.name].concat(marks).concat([marks.filter(Boolean).length]));
    });
    R.push(["","","","탑승인원"].concat(ds.map(function(d){
      return rt.stops.filter(function(st){ return st.sid&&(CAMP.board[d]||{})[st.sid]; }).length; })));
    R.push([]);
  });
  R.push([]); R.push(["[식단표 · 식비]"]);
  R.push(["날짜","국","단백질 메인","나물/샐러드","마른/기타반찬","식사인원","식비","비고"]);
  ds.forEach(function(d){
    var m=CAMP.meals[d]||{};
    if(m.special){ R.push([fmtD(d),"특식 "+(m.spNote||""),"","","",(m.spCnt||attCnt(d)),mealTotal(d),(m.note||"")]); return; }
    var cell=function(k){ var pk=(m.pick||{})[k]; if(!pk||!pk.n) return "";
      return pk.n+(pk.q?" ("+pk.q+(pk.note?" / "+pk.note:"")+")":""); };
    R.push([fmtD(d),cell("soup"),cell("main"),cell("veg"),cell("side"),
            (m.people||attCnt(d)),mealTotal(d),(m.note||"")]);
  });
  R.push(["","","","","합계", mealPeople(), mealAllTotal(), ""]);
  R.push([]); R.push(["[캠프생 이력 · 영어레벨 추적]"]);
  R.push(["이름","생년월일","참가횟수","최근레벨","RL_ID","캠프별 기록"]);
  buildHistory().forEach(function(pp){
    R.push([pp.name, pp.birth, pp.recs.length, pp.level, pp.rlid,
      pp.recs.map(function(r){ return r.camp.set.name+" "+campAttended(r)+"일"+(r.s.level?" 레벨:"+r.s.level:"")+(r.s.rlid?" ID:"+r.s.rlid:""); }).join(" | ")]);
  });
  R.push([]); R.push(["[기타 지출]"]); R.push(["항목","금액"]);
  (DB.extra||[]).forEach(function(x){ R.push([x.n, Number(x.v)||0]); });
  R.push(["기타 지출 합계", extraTotal()]);
  R.push(["총 지출 (식비+기타)", mealAllTotal()+extraTotal()]);
  var csv="\uFEFF"+R.map(function(r){ return r.map(e).join(","); }).join("\n");
  var a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8"}));
  a.download=(CAMP.set.name||"캠프")+"_백업_"+todayStr()+".csv";
  a.click(); URL.revokeObjectURL(a.href);
}

        '<td class="lft"><div style="display:flex;gap:4px;flex-wrap:wrap;align-items:center">'+

        (left>0&&unass.length?'<select class="input" style="width:auto;padding:5px 8px;font-size:11.5px" onchange="ltAssign('+i+',this.value)"><option value="">＋ 배정</option>'+
          unass.map(function(st){ return '<option value="'+st.id+'">'+esc(st.name)+'</option>'; }).join("")+'</select>':'')+
        '</div></td>'+
        '<td><button class="btn red" style="padding:4px 7px;font-size:11px" onclick="delLT('+i+')">×</button></td></tr>';

function draftsFromRows(rows){
  var out=[];
  rows.forEach(function(c){
    var name=(c[2]||"").trim(); if(!name) return;
    var looksData = /\d{4}/.test(c[0]||"") || /\d/.test(c[3]||"");
    if(!looksData) return;
    if(/캠프생|주소|밴드|레벨을|타임스탬프/.test(name)) return;
    var birth=(c[3]||"").trim().slice(0,10).replace(/\./g,"-").replace(/\s/g,"").replace(/-$/,"");
    var ref=(c[14]||"");
    var disc=0, dl="할인 없음";
    if(/나라차|클래식/.test(ref)){ disc=0.2; dl=DISC[0][1]; }
    else if(/이전 캠프/.test(ref)){ disc=0.1; dl=DISC[2][1]; }
    else if(/지인/.test(ref)){ disc=0.1; dl=DISC[3][1]; }
    var period=(c[13]||"").trim();
    var allDays=/전 일정/.test(period);
    var lvRaw=(c[17]||"").trim();
    var lv=/모름|테스트|레테/.test(lvRaw)?"":lvRaw;
    var mealNote=(c[16]||"").trim();
    var memoArr=[];
    if(!allDays && period) memoArr.push("참여기간:"+period);
    if(mealNote && !/없습|없음|^x$/i.test(mealNote)) memoArr.push("식사주의:"+mealNote);
    if(!lv && lvRaw) memoArr.push("레벨:"+lvRaw);
    var draft={ name:name, birth:birth, school:(c[4]||"").trim(), grade:(c[5]||"").trim(),
      gender:(/여/.test(c[6]||"")?"여":"남"), guardian:(c[11]||"").trim(), phone:(c[12]||"").trim(),
      pkg:"full", days:(allDays?campDates().length:0), disc:disc, discLabel:dl,
      bus:(/신청합니다/.test(c[9]||"")?"b1":""), busHalf:false,
      vehicle:/신청합니다/.test(c[9]||""), stop:(c[10]||"").trim(), time:"",
      cls:"", no:0, level:lv, rlid:"", plan:[], memo:memoArr.join(" / ") };
    var dup=CAMP.students.some(function(x){ return samePerson(x,draft); });
    var hist=historyOf(draft).length;
    out.push({d:draft, dup:dup, hist:hist, use:!dup});
  });
  return out;
}

function parseImport(){
  var txt=document.getElementById("impText").value;
  if(!txt.trim()){ alert("붙여넣은 내용이 없습니다."); return; }
  var rows=txt.split(/\r?\n/).filter(function(l){return l.trim();}).map(function(l){return l.split("\t");});
  showImportPreview(draftsFromRows(rows), "붙여넣기 응답");

function fetchApply(){
  var sid=(DB.applySid||"").trim();
  if(!sid){ alert("먼저 아래에 응답 시트 주소(또는 ID)를 입력해 주세요."); return; }
  var prev=document.getElementById("impPrev");
  prev.innerHTML='<div class="small" style="margin-top:12px">구글 폼 응답을 불러오는 중…</div>';
  fetch(GSHEET_URL+"?key="+encodeURIComponent(accessKey())+"&store=apply&sid="+encodeURIComponent(sid))
    .then(function(r){ return r.json(); })
    .then(function(rows){
      if(rows && rows.error==="AUTH"){ prev.innerHTML='<div class="small" style="color:var(--red);margin-top:12px">접속키 오류입니다.</div>'; return; }
      if(rows && rows.error==="NOSID"){ prev.innerHTML='<div class="small" style="color:var(--red);margin-top:12px">응답 시트 ID가 서버에 전달되지 않았습니다.</div>'; return; }
      if(rows && rows.error){ prev.innerHTML='<div class="small" style="color:var(--red);margin-top:12px">시트를 열지 못했습니다. ① 서버 코드가 v2인지 ② 응답 시트가 같은 구글 계정 소유인지 확인해 주세요.</div>'; return; }
      if(!rows || !rows.length){ prev.innerHTML='<div class="small" style="margin-top:12px">응답이 없습니다.</div>'; return; }
      showImportPreview(draftsFromRows(rows), "구글 폼 자동");
    })

function ltCard(){
  var need=needLevel();

    '<button class="btn line" style="margin-left:auto;padding:6px 10px;font-size:12px" onclick="addLT()">＋ 시간대</button></div>';
  if(!LT().length) h+='<div class="small">시간대를 추가하세요. 예: 7/20(월) 오후 7:30, 정원 5명</div>';

    h+='<table class="sheet" style="width:100%"><thead><tr><th class="lft">시간대</th><th>정원</th><th>배정</th><th>잔여</th><th class="lft" style="min-width:250px">배정 학생</th><th></th></tr></thead><tbody>';
    LT().forEach(function(sl,i){
      var used=(sl.ids||[]).length, left=(Number(sl.cap)||0)-used;
      h+='<tr><td class="lft" style="font-weight:700">'+esc(sl.t)+'</td><td>'+sl.cap+'</td><td>'+used+'</td>'+
        '<td style="font-weight:800;color:'+(left>0?'var(--green)':'var(--red)')+'">'+(left>0?left:'마감')+'</td>'+
        '<td class="lft"><div style="display:flex;gap:4px;flex-wrap:wrap;align-items:center">'+
        (sl.ids||[]).map(function(id){ var st=stuById(id); return st?'<button class="chip on" style="padding:4px 8px;font-size:11.5px" onclick="ltRemove('+i+',\''+id+'\')">'+esc(st.name)+' ×</button>':''; }).join("")+
        (left>0&&unass.length?'<select class="input" style="width:auto;padding:5px 8px;font-size:11.5px" onchange="ltAssign('+i+',this.value)"><option value="">＋ 배정</option>'+
          unass.map(function(st){ return '<option value="'+st.id+'">'+esc(st.name)+'</option>'; }).join("")+'</select>':'')+
        '</div></td>'+
        '<td><button class="btn red" style="padding:4px 7px;font-size:11px" onclick="delLT('+i+')">×</button></td></tr>';
    });
    h+='</tbody></table>';
  }
  if(unass.length) h+='<div class="small" style="margin-top:8px">미배정(첫날 테스트 대상): <b>'+unass.map(function(st){return esc(st.name);}).join(" · ")+'</b></div>';
  h+='</div>';
  return h;
}

function draftsFromRows(rows){
  var out=[];
  rows.forEach(function(c){
    var name=(c[2]||"").trim(); if(!name) return;
    var looksData = /\d{4}/.test(c[0]||"") || /\d/.test(c[3]||"");
    if(!looksData) return;
    if(/캠프생|주소|밴드|레벨을|타임스탬프/.test(name)) return;
    var birth=(c[3]||"").trim().slice(0,10).replace(/\./g,"-").replace(/\s/g,"").replace(/-$/,"");
    var ref=(c[14]||"");
    var disc=0, dl="할인 없음";
    if(/나라차|클래식/.test(ref)){ disc=0.2; dl=DISC[0][1]; }
    else if(/이전 캠프/.test(ref)){ disc=0.1; dl=DISC[2][1]; }
    else if(/지인/.test(ref)){ disc=0.1; dl=DISC[3][1]; }
    var period=(c[13]||"").trim();
    var allDays=/전 일정/.test(period);
    var lvRaw=(c[17]||"").trim();
    var lv=/모름|테스트|레테/.test(lvRaw)?"":lvRaw;
    var mealNote=(c[16]||"").trim();
    var memoArr=[];
    if(!allDays && period) memoArr.push("참여기간:"+period);
    if(mealNote && !/없습|없음|^x$/i.test(mealNote)) memoArr.push("식사주의:"+mealNote);
    if(!lv && lvRaw) memoArr.push("레벨:"+lvRaw);
    var draft={ name:name, birth:birth, school:(c[4]||"").trim(), grade:(c[5]||"").trim(),
      gender:(/여/.test(c[6]||"")?"여":"남"), guardian:(c[11]||"").trim(), phone:(c[12]||"").trim(),
      pkg:"full", days:(allDays?campDates().length:0), disc:disc, discLabel:dl,
      bus:(/신청합니다/.test(c[9]||"")?"b1":""), busHalf:false,
      vehicle:/신청합니다/.test(c[9]||""), stop:(c[10]||"").trim(), time:"",
      cls:"", no:0, level:lv, rlid:"", plan:[], memo:memoArr.join(" / ") };
    var dup=CAMP.students.some(function(x){ return samePerson(x,draft); });
    var hist=historyOf(draft).length;
    out.push({d:draft, dup:dup, hist:hist, use:!dup});
  });
  return out;
}

function parseImport(){
  var txt=document.getElementById("impText").value;

  var rows=txt.split(/\r?\n/).filter(function(l){return l.trim();}).map(function(l){return l.split("\t");});
  showImportPreview(draftsFromRows(rows), "붙여넣기 응답");
}

      if(rows && rows.error==="AUTH"){ prev.innerHTML='<div class="small" style="color:var(--red);margin-top:12px">접속키 오류입니다.</div>'; return; }
      if(rows && rows.error==="NOSID"){ prev.innerHTML='<div class="small" style="color:var(--red);margin-top:12px">응답 시트 ID가 서버에 전달되지 않았습니다.</div>'; return; }
      if(rows && rows.error){ prev.innerHTML='<div class="small" style="color:var(--red);margin-top:12px">시트를 열지 못했습니다. ① 서버 코드가 v2인지 ② 응답 시트가 같은 구글 계정 소유인지 확인해 주세요.</div>'; return; }
      if(!rows || !rows.length){ prev.innerHTML='<div class="small" style="margin-top:12px">응답이 없습니다.</div>'; return; }
      showImportPreview(draftsFromRows(rows), "구글 폼 자동");
    })
    .catch(function(){ prev.innerHTML='<div class="small" style="color:var(--red);margin-top:12px">불러오기 실패. 인터넷 연결을 확인해 주세요.</div>'; });
}

  {n:"클래식리더 시스템 사용료", v:0}, {n:"쌀", v:0}, {n:"잡곡", v:0}, {n:"김", v:0},
  {n:"종이컵·식기류", v:0}, {n:"문구류 (이름표 등)", v:0}, {n:"복사지", v:0}, {n:"유류대", v:0}
];
function EXTRA(){ if(!DB.extra) DB.extra=JSON.parse(JSON.stringify(DEFAULT_EXTRA)); return DB.extra; }
function extraTotal(){ var t=0; EXTRA().forEach(function(x){ t+=Number(x.v)||0; }); return t; }
function setExtra(i,v){ EXTRA()[i].v=Number(v)||0; saveLocal(); render(); }
function addExtra(){
  var n=prompt("추가할 지출 항목 이름");

  EXTRA().push({n:n.trim(), v:0}); saveLocal(); render();

function delExtra(i){

/* ---- 요금 기준 수정 (관리자) ---- */
function rateCard(){
  var r=RATE();
  var row=function(label,key,unit,note){
    return '<tr><td class="lft">'+label+'</td>'+
      '<td style="width:130px"><input class="input" style="text-align:right;padding:7px 9px;font-size:13px" type="number" value="'+(r[key]||0)+'" onblur="setRate(\''+key+'\',this.value)"></td>'+
      '<td style="width:34px">'+unit+'</td><td class="lft small">'+(note||"")+'</td></tr>';
  };
  var per=PRICE_SUM();
  return '<div class="card" style="padding:13px"><div style="display:flex;align-items:center;gap:10px;margin-bottom:9px">'+
    '<h2 style="margin:0;font-size:15px">요금 기준</h2>'+
    '<span class="small">1일 풀패키지 <b>'+won(per.full)+'</b> (수업료 '+won(per.tuition)+' + 식비 '+won(r.meal)+')</span>'+
    '<button class="btn line" style="margin-left:auto;padding:6px 10px;font-size:12px" onclick="resetRate()">기본값 복원</button></div>'+
    '<table class="sheet" style="width:100%"><tbody>'+
    row("영어 수업","eng","원","1일 기준")+row("체육 수업","pe","원","1일 기준")+
    row("레크레이션","rec","원","1일 기준")+row("식사비","meal","원","할인 적용 안 됨")+
    '<tr><td colspan="4" style="height:6px;background:#FBFAF7"></td></tr>'+
    row("차량 2km 이하","bus1","원","캠프 1회 정액")+row("차량 2~4km","bus2","원","형제 50% 할인")+
    row("차량 4km 이상","bus3","원","상담 후 결정")+
    '<tr><td colspan="4" style="height:6px;background:#FBFAF7"></td></tr>'+
    row("할인 최소 일수","minDays","일","미만이면 경고 표시")+
    '</tbody></table>'+
    '<div class="small" style="margin-top:8px">금액을 수정하면 이후 계산에 바로 반영됩니다. 할인율: 원생 20% · 동반/연속/지인 10% · 특별 30%</div></div>';
}
function PRICE_SUM(){
  var r=RATE(), t=(Number(r.eng)||0)+(Number(r.pe)||0)+(Number(r.rec)||0);
  return { tuition:t, full:t+(Number(r.meal)||0) };
}
function setRate(k,v){
  if(!DB.rate) DB.rate=JSON.parse(JSON.stringify(DEFAULT_RATE));
  DB.rate[k]=Number(v)||0; saveLocal(); render();
}
function resetRate(){
  if(!confirm("요금 기준을 처음 기본값으로 되돌릴까요?")) return;
  DB.rate=JSON.parse(JSON.stringify(DEFAULT_RATE)); saveLocal(); render();
}

/* ---- 새 캠프 시작 / 삭제 ---- */
function openNewCamp(){
  var y=new Date().getFullYear();
  document.getElementById("modalHost").innerHTML =
  '<div class="modalBg" onclick="if(event.target===this)closeModal()"><div class="modal">'+
  '<h2>새 캠프 시작</h2>'+
  '<div class="small" style="margin-bottom:8px">지금 캠프는 그대로 보관되고, 새 캠프가 만들어집니다.</div>'+
  '<span class="label">캠프 이름</span><input class="input" id="nc_name" placeholder="'+y+' 겨울방학 캠프">'+
  '<div class="row"><div><span class="label">시작일</span><input class="input" id="nc_start" type="date"></div>'+
  '<div><span class="label">종료일</span><input class="input" id="nc_end" type="date"></div></div>'+
  '<div style="margin:14px 0"><label><input type="checkbox" id="nc_copy" checked> 현재 캠프 캠프생 명단 이어받기</label>'+
  '<div class="small" style="margin-top:4px">이름·연락처·차량 정보를 복사합니다. 출석 기록은 새로 시작하며, 이어받은 캠프생은 메모에 "이전 캠프 참가"가 표시되어 재등록 할인 파악이 쉽습니다.</div></div>'+
  '<div class="row"><button class="btn full" onclick="saveNewCamp()">만들기</button><button class="btn gray full" onclick="closeModal()">취소</button></div>'+
  '</div></div>';
}
function saveNewCamp(){
  var name=document.getElementById("nc_name").value.trim();
  var start=document.getElementById("nc_start").value, end=document.getElementById("nc_end").value;
  if(!name){ alert("캠프 이름을 입력해 주세요."); return; }
  if(!start||!end){ alert("시작일과 종료일을 선택해 주세요."); return; }
  var c=newCamp(name,start,end);
  if(document.getElementById("nc_copy").checked){
    var days=0, d=new Date(start+"T00:00:00"), e=new Date(end+"T00:00:00");
    while(d<=e){ if(d.getDay()>=1&&d.getDay()<=5)days++; d.setDate(d.getDate()+1); }
    CAMP.students.forEach(function(s){
      c.students.push({ id:Date.now().toString(36)+Math.random().toString(36).slice(2,5),
        name:s.name, grade:s.grade, school:s.school, gender:s.gender, guardian:s.guardian, phone:s.phone,
        pkg:s.pkg, days:days, disc:s.disc, discLabel:s.discLabel, vehicle:s.vehicle,
        bus:s.bus||"", busHalf:!!s.busHalf, stop:s.stop, time:s.time,
        memo:"이전 캠프("+CAMP.set.name+") 참가" });
    });
  }
  DB.camps.push(c);
  saveLocal(); closeModal(); setCur(c.id);
  alert("새 캠프가 시작되었습니다. 이어받은 캠프생 중 이번에 안 오는 캠프생은 목록에서 삭제하시면 됩니다.");
}
function delCamp(id){
  var c=null; DB.camps.forEach(function(x){ if(x.id===id) c=x; });
  if(!c) return;
  if(!confirm('"'+c.set.name+'" 캠프를 삭제할까요? 이 캠프의 모든 기록이 사라집니다.')) return;
  if(!confirm("정말 삭제합니까? 되돌릴 수 없습니다. (삭제 전 정산 탭에서 CSV 백업 권장)")) return;
  DB.camps = DB.camps.filter(function(x){ return x.id!==id; });
  saveLocal(); pickCamp(); render();
}

/* ── 새 버전 자동 적용 ──
   깃허브에 새 camp.html이 올라오면(APP_VER가 달라지면) 안내 후 자동 새로고침 */
var updShown=false;
function checkUpdate(){
  if(!/^https?:/.test(location.protocol) || updShown) return;
  var url=location.origin+location.pathname+"?chk="+Date.now();
  fetch(url,{cache:"no-store"})
    .then(function(r){ return r.text(); })
    .then(function(t){
      var m=t.match(/APP_VER\s*=\s*"([^"]+)"/);
      if(m && m[1]!==APP_VER){
        updShown=true;
        var bar=document.createElement("div");
        bar.style.cssText="position:fixed;top:0;left:0;right:0;z-index:99;background:#1E7B3C;color:#fff;text-align:center;padding:10px;font-size:13.5px;font-weight:700";
        bar.textContent="새 버전이 나왔습니다 · 잠시 후 자동으로 새로고침됩니다";
        document.body.appendChild(bar);
        setTimeout(function(){ location.replace(location.pathname+"?u="+Date.now()); }, 2500);
      }
    })
    .catch(function(){});
}
setTimeout(checkUpdate, 8000);            /* 켠 직후 1회 */
setInterval(checkUpdate, 300000);         /* 이후 5분마다 */
document.addEventListener("visibilitychange", function(){   /* 화면을 다시 켤 때도 확인 */
  if(!document.hidden) checkUpdate();
});
</script>
