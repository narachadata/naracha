<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나라차X클래식리더 방학캠프</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root { --bg:#F5F3EE; --ink:#1B2233; --sub:#6B7280; --line:#E7E2D8; --card:#FFFFFF;
          --blue:#1E2A52; --blueSoft:#EBEEF6; --red:#B5343F; --redSoft:#F9ECED;
          --green:#1E7B3C; --greenSoft:#EAF6EE; --amber:#B07D1A; --amberSoft:#FBF3E2;
          --navy:#141C33; --navyLine:#28324F; --navyDim:#8C96AE; }
  * { box-sizing:border-box; -webkit-font-smoothing:antialiased; }
  body { margin:0; background:var(--bg); color:var(--ink);
         font-family:'Pretendard',-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
         letter-spacing:-0.02em; font-variant-numeric:tabular-nums; }
  .belt { height:4px; display:flex; }
  .belt div:first-child { flex:1; background:var(--red); }
  .belt div:last-child { flex:1; background:var(--blue); }
  .header { background:var(--navy); padding:13px 16px 0; }
  .hTop { display:flex; align-items:center; gap:11px; max-width:1560px; margin:0 auto; }
  .hBrand { flex:1; min-width:0; }
  .brandLine { font-size:12px; font-weight:700; color:#fff; letter-spacing:.02em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .brandLine .bx { color:var(--red); font-weight:800; margin:0 2px; }
  .brandSub { font-size:9.5px; color:var(--navyDim); letter-spacing:.14em; margin-top:1px; }
  .campName { display:inline-flex; align-items:center; gap:5px; margin-top:6px; background:#1E2947;
              border:1px solid var(--navyLine); color:#fff; font-family:inherit; font-weight:800;
              font-size:15.5px; padding:5px 11px; border-radius:9px; cursor:pointer; max-width:100%; }
  .campName .arw { color:var(--navyDim); font-size:11px; }
  .hRight { text-align:right; }
  .syncDot { display:inline-block; width:7px; height:7px; border-radius:99px; margin-right:5px; vertical-align:1px; }
  .syncTxt { font-size:10.5px; color:var(--navyDim); }
  .tabs { display:flex; gap:22px; overflow-x:auto; margin-top:10px; max-width:1560px; margin-left:auto; margin-right:auto; }
  .tab { flex:0 0 auto; padding:11px 2px 10px; font-size:14px; background:none; border:none;
         color:var(--navyDim); border-bottom:2.5px solid transparent; cursor:pointer; font-family:inherit; font-weight:600; white-space:nowrap; }
  .tab.on { color:#fff; font-weight:800; border-bottom-color:var(--red); }
  /* ── 관리자 전용 메뉴: 오른쪽 끝 분리 + 알약 모양으로 구분 ── */
  .tabSpacer { flex:1 1 24px; min-width:24px; }
  .tabAdmMark { flex:0 0 auto; align-self:center; font-size:11px; font-weight:700; color:#8B96B5; letter-spacing:.4px; margin-right:3px; white-space:nowrap; }
  .tab.adm { background:rgba(255,255,255,.07); border:1.5px solid rgba(255,255,255,.18); border-radius:99px;
             padding:7px 15px; margin:5px 0; font-size:13px; color:#C9D2E8; }
  .tab.adm.on { background:var(--red); border-color:var(--red); color:#fff; font-weight:800; }

  /* ══ 급식표 캘린더 ══ */
  .mcalWkHead { display:flex; align-items:center; gap:7px; font-weight:800; font-size:14px; color:var(--blue);
                background:var(--blueSoft); border-radius:9px; padding:8px 13px; margin:12px 0 8px; cursor:pointer; user-select:none; }
  .mcalWkHead:first-of-type { margin-top:0; }
  .mcalGrid { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; }
  .mcalCell { background:#fff; border:1.5px solid var(--line); border-radius:12px; padding:9px 11px 11px;
              min-height:112px; cursor:pointer; transition:border-color .12s; }
  .mcalCell:hover { border-color:var(--blue); }
  .mcalCell.today { border:2px solid var(--blue); box-shadow:0 0 0 3px var(--blueSoft); }
  .mcalCell.off { background:#FAF8F3; cursor:default; border-style:dashed; }
  .mcalCell.hol { background:#F3EFE8; cursor:default; }
  .mcalDate { font-weight:800; font-size:12.5px; margin-bottom:6px; padding-bottom:5px; border-bottom:1.5px solid #EFEBE2;
              display:flex; align-items:center; justify-content:space-between; }
  .mcalCnt { font-size:10.5px; font-weight:800; color:var(--blue); background:var(--blueSoft); padding:1px 7px; border-radius:99px; }
  .mcalDish { font-size:12.5px; font-weight:600; padding:2px 0; color:#3A3630; }
  .mcalSp { font-size:12.5px; font-weight:800; color:var(--amber); background:var(--amberSoft); border-radius:7px; padding:5px 8px; }
  .mcalNone { font-size:12px; color:#B8B2A6; padding:2px 0; }
  .mcalHolName { font-size:12px; font-weight:700; color:#A0522D; }

  /* ══ 알림 토스트 (동시 수정 안내 등) ══ */
  .toast { position:fixed; left:50%; bottom:26px; transform:translate(-50%,16px); z-index:200;
           background:var(--navy); color:#fff; font-size:13.5px; font-weight:700; padding:12px 20px;
           border-radius:99px; box-shadow:0 8px 26px rgba(20,28,55,.35); opacity:0; pointer-events:none;
           transition:opacity .25s, transform .25s; max-width:88vw; text-align:center; }
  .toast.show { opacity:1; transform:translate(-50%,0); }
  /* 탭 경고 배지 (차량표 불일치 등) */
  .tabBadge { display:inline-block; min-width:17px; height:17px; line-height:17px; padding:0 4px; margin-left:5px;
              background:var(--red); color:#fff; border-radius:99px; font-size:10.5px; font-weight:800;
              text-align:center; vertical-align:1px; }

  /* ══ 출석부 얇은 툴바 ══ */
  .attBar { display:flex; align-items:center; gap:8px; flex-wrap:wrap; background:var(--card);
            border-radius:12px; padding:7px 12px; margin-bottom:10px; box-shadow:0 1px 3px rgba(30,40,70,.05); }
  .attFoldBtn { border:none; background:var(--blueSoft); color:var(--blue); font-family:inherit; font-size:13px;
                padding:6px 13px; border-radius:8px; cursor:pointer; white-space:nowrap; }
  .attFoldBtn b { font-weight:800; }
  .attBarInfo { font-size:12.5px; color:var(--sub); }
  .attBarSpacer { flex:1 1 auto; }
  .attBar .attBarSel { width:130px !important; flex:0 0 130px; padding:6px 10px; font-size:12.5px; }
  .attBar .btn { flex:0 0 auto; }

  /* ══ 운영 탭 2열 레이아웃 ══ */
  .opsGrid { display:grid; grid-template-columns:1fr 1fr; gap:14px; align-items:start; }
  .opsCol { display:flex; flex-direction:column; gap:0; min-width:0; }
  .opsCol > .card { margin-bottom:14px; }
  .opsCol > .card:last-child { margin-bottom:0; }
  @media (max-width:900px){ .opsGrid { grid-template-columns:1fr; } }
  .wrap { max-width:1560px; margin:0 auto; padding:20px 22px 60px; }
  .grid2 { display:grid; grid-template-columns:repeat(auto-fit,minmax(430px,1fr)); gap:12px; align-items:start; }
  .grid2 > .card { margin-bottom:0; }
  .sheet { border-collapse:collapse; font-size:12px; white-space:nowrap; }
  .sheet th { padding:5px 6px; border-bottom:2px solid var(--line); border-right:1px solid #E7E2D8; font-weight:700; text-align:center; background:#FBFAF7; position:sticky; top:0; }
  .sheet td { padding:4px 6px; border-bottom:1px solid #EDE8DE; border-right:1px solid #ECE7DC; text-align:center; }
  .sheet .lft { text-align:left; }
  /* 주(週) 시작 = 굵은 파란 세로 구분선 */
  .sheet .wk { border-left:3px solid var(--blue) !important; }
  .sheet th.wk, .sheet td.wk { box-shadow:inset 2px 0 0 #DCE3F2; }
  .sheet .wkhead { border-bottom:none; height:27px; box-sizing:border-box; padding:0 8px; line-height:27px; font-size:11.5px; font-weight:800; color:#fff; background:var(--blue); }
  /* 헤더 2줄이 스크롤 때 겹치지 않게 층을 나눔: 1줄(주차)=맨 위, 2줄(날짜)=그 아래 27px 지점 고정 */
  .sheet thead tr:first-child th { z-index:6; }
  .sheet thead tr:nth-child(2) th { top:27px; z-index:5; }
  /* 날짜 칸: 폭 통일(넓은 칸 기준) + 짝수줄 옅은 배경으로 행 구분 강화 */
  .sheet td.dcell, .sheet th.dcell { min-width:34px; width:34px; max-width:34px; }
  .sheet tbody tr.stripe td { background-color:#FAF8F3; }
  .sheet tbody tr.stripe td.idc { filter:brightness(0.975); }
  .sheet tbody tr:hover td { background-color:#F3F6FC; }
  .modal { border-radius:20px; max-width:760px; margin:auto; }
  .modalBg { align-items:center; }
  .card { background:var(--card); border-radius:16px; padding:18px; margin-bottom:12px;
          box-shadow:0 1px 3px rgba(0,0,0,.04), 0 4px 12px rgba(0,0,0,.04); }
  .label { font-size:13px; font-weight:600; color:var(--sub); margin:10px 0 6px; display:block; }
  .input { width:100%; font-size:16px; padding:12px 14px; border:1.5px solid var(--line);
           border-radius:10px; background:#FAFAFC; outline:none; font-family:inherit; }
  .input:focus { border-color:var(--blue); background:#fff; }
  .chips { display:flex; gap:8px; flex-wrap:wrap; }
  .chip { padding:7px 13px; border-radius:10px; border:1.5px solid var(--line); background:#fff;
          font-size:13.5px; cursor:pointer; font-family:inherit; font-weight:500; }
  .chip.on { border-color:var(--blue); background:var(--blueSoft); color:var(--blue); font-weight:700; }
  .dchips { display:flex; gap:7px; overflow-x:auto; padding-bottom:6px; margin-bottom:10px; }
  .dchip { flex:0 0 auto; padding:8px 13px; border-radius:999px; font-size:12.5px; font-weight:700;
           border:1.5px solid var(--line); background:#fff; color:var(--sub); cursor:pointer; font-family:inherit; white-space:nowrap; }
  .dchip.on { background:var(--ink); border-color:var(--ink); color:#fff; }
  .btn { border:none; border-radius:12px; padding:13px 16px; font-size:15px; font-weight:700;
         cursor:pointer; font-family:inherit; color:#fff; background:var(--navy); }
  .btn.red { background:var(--red); } .btn.gray { background:#8A8F98; } .btn.green { background:var(--green); }
  .btn.line { background:#fff; color:var(--ink); border:1.5px solid var(--line); }
  .btn.full { width:100%; }
  .row { display:flex; gap:8px; }
  .row > * { flex:1; }
  .item { display:flex; justify-content:space-between; align-items:center; gap:8px;
          background:#fff; border:1.5px solid var(--line); border-radius:14px; padding:13px 14px; margin-bottom:8px; cursor:pointer; }
  .item.on { border-color:var(--green); background:var(--greenSoft); }
  .item .nm { font-weight:700; font-size:15.5px; }
  .item .sb { font-size:12px; color:var(--sub); margin-top:2px; }
  .mark { font-weight:800; font-size:16px; color:#D5D2C9; }
  .item.on .mark { color:var(--green); }
  .kpi { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:12px; }
  .kpi .card { padding:13px 8px; text-align:center; margin:0; }
  .kpi .v { font-size:15px; font-weight:800; margin-top:3px; }
  .kpi .l { font-size:11.5px; color:var(--sub); }
  .bar { height:14px; border-radius:99px; background:var(--blueSoft); overflow:hidden; }
  .bar > div { height:100%; background:var(--blue); border-radius:99px; }
  .small { font-size:12px; color:var(--sub); }
  h2 { font-size:17px; margin:4px 0 12px; }
  .fee { display:flex; justify-content:space-between; align-items:center; background:var(--blueSoft);
         border-radius:12px; padding:13px 15px; margin:12px 0; }
  .fee b { color:var(--blue); font-size:17px; }
  .modalBg { position:fixed; inset:0; background:rgba(20,25,35,.45); display:flex; align-items:flex-end; justify-content:center; z-index:50; }
  .modal { background:#fff; width:100%; max-width:680px; max-height:88vh; overflow-y:auto;
           border-radius:20px 20px 0 0; padding:20px 18px 30px; }
  .empty { text-align:center; color:var(--sub); font-size:13.5px; padding:26px 0; }
  .tag { font-size:11px; font-weight:700; padding:2px 8px; border-radius:99px; background:var(--amberSoft); color:var(--amber); }



  /* ── 출석부 색 구분 ── */
  .sheet th.hdrInfo, .sheet td.hdrInfo { background:#FFF6CC !important; }   /* 인적사항 제목 */
  .sheet th.hdrMon,  .sheet td.hdrMon  { background:#D4E9CC !important; }   /* 월요일 */
  .sheet th.hdrDay,  .sheet td.hdrDay  { background:#DFE9F5 !important; }   /* 화~금 */
  .sheet th.hdrSum,  .sheet td.hdrSum  { background:#FBDDE0 !important; }   /* 집계 */
  .sheet tr.clsA td.idc { background:#E3EDFB !important; }  /* A반 인적사항 */
  .sheet tr.clsB td.idc { background:#E4F3E7 !important; }  /* B반 인적사항 */
  .sheet tr.stripe td.idc { filter:brightness(0.985); }
  .sheet tbody td.cAbs  { background:#B3ADA2 !important; color:#847E72 !important; }  /* 안 오는 날(미배치) — 어두운 회색 */
  .sheet tbody td.cGone { background:#555047 !important; color:#fff !important; }     /* 지나간 미체크 = 결석 추정(진한 회색) */
  .sheet tbody td.cOn   { background:linear-gradient(#249247,#1E7B3C) !important; color:#fff !important; text-shadow:0 1px 1px rgba(0,0,0,.15); }  /* 출석 */
  .sheet tbody td.cNo   { background:linear-gradient(#D0453A,#C0392B) !important; color:#fff !important; text-shadow:0 1px 1px rgba(0,0,0,.15); }  /* 명시 결석 */
  .sheet tbody td.cPlan { background:#EEF4FF !important; color:#A9B4C8 !important; }  /* 배치 예정 */
  .sheet tbody td.cHol, .sheet th.cHol  { background:#E4E0D8 !important; color:#A9A296 !important; }  /* 휴일 */
  .sheet tbody td.cSkip { background:#FCE9B8 !important; color:#8A5A00 !important; font-size:10px; }   /* 차량 제외 */
  .sheet tbody td.cBusOn   { background:#EAF6EE !important; }                                          /* 탑승 예정 (아이콘) */
  .sheet tbody td.cBusSkip { background:#FCE9B8 !important; color:#B07D1A !important; }                 /* 차량 제외됨 */
  .sheet tbody td.cBusNo   { background:#F3EEEA !important; }                                          /* 결석 (안 탐) */
  .sheet tbody td.warn  { background:#FFF4D6 !important; }      /* 레벨테스트 필요 */
  .sheet tbody td.mkCell{ background:#FDE7E9 !important; color:#B5343F !important; font-weight:800; }
  .sheet tbody tr.sumRow td { background:#F3F1EA !important; font-weight:800; }
  .sheet td.nameCell { position:sticky; left:0; z-index:1; }
  .sheet th.hdrInfo.nameCell { position:sticky; left:0; z-index:3; }
  .sheet tr:hover td:not(.idc) { filter:brightness(0.97); }
  /* 출석/결석 칸 안의 마크를 살짝 키워 잘 보이게 */
  .sheet tbody td.cOn, .sheet tbody td.cNo { font-size:13px; }
  /* 오늘 날짜 열 강조 (헤더에 붉은 밑줄은 기존 유지 + 배경 살짝) */
  .sheet th.dToday { box-shadow:inset 0 -3px 0 var(--red); }
  /* ── 이름 검색 ── */
  .findBar { position:fixed; top:0; left:0; right:0; z-index:120; background:var(--navy);
             border-bottom:2px solid var(--red); padding:10px 18px; display:flex; align-items:center; gap:12px;
             box-shadow:0 6px 24px rgba(0,0,0,.28); }
  .findBar input { flex:0 0 320px; padding:9px 13px; border-radius:9px; border:1.5px solid var(--navyLine);
                   background:#1E2947; color:#fff; font-size:15px; font-family:inherit; outline:none; }
  .findBar input:focus { border-color:var(--red); }
  .findBar .res { color:var(--navyDim); font-size:13px; }
  .findBar .hit { display:inline-block; background:#1E2947; border:1px solid var(--navyLine); color:#fff;
                  border-radius:8px; padding:6px 11px; font-size:13px; cursor:pointer; margin-right:6px; }
  .findBar .hit:hover { border-color:var(--red); }
  .findBar .x { margin-left:auto; background:none; border:none; color:var(--navyDim); font-size:20px; cursor:pointer; }
  @keyframes neonPulse {
    0%,100% { box-shadow:0 0 4px #FFE066, 0 0 12px #FFD11A, 0 0 22px #FFB800; background:#FFF6D6; }
    50%     { box-shadow:0 0 10px #FFF3B0, 0 0 26px #FFD11A, 0 0 44px #FFB800; background:#FFFBEA; }
  }
  .neon { animation:neonPulse 1s ease-in-out 4; border-radius:7px;
          outline:2.5px solid #FFC400; position:relative; z-index:5; }
  .neonTxt { color:#8A5A00 !important; font-weight:900 !important; text-shadow:0 0 8px #FFD11A; }
  /* ── A4 일일 출석부 인쇄 ── */
  #printArea { display:none; }
  @media print {
    body > *:not(#printArea) { display:none !important; }
    #printArea { display:block !important; }
    @page { size:A4 portrait; margin:10mm 11mm; }
  }
  .pSheet { font-family:'Pretendard','Malgun Gothic',sans-serif; color:#000; }
  .pHead { text-align:center; border-bottom:2.5px solid #000; padding-bottom:7px; margin-bottom:4px; }
  .pTitle { font-size:15pt; font-weight:800; letter-spacing:-0.03em; }
  .pOrg { font-size:9pt; color:#333; margin-top:3px; letter-spacing:.02em; }
  .pMeta { display:flex; justify-content:space-between; align-items:flex-end; margin:8px 0 6px; font-size:10.5pt; }
  .pMeta .d { font-weight:800; font-size:12pt; }
  .pMeta .n { font-size:9.5pt; color:#333; }
  .pTbl { width:100%; border-collapse:collapse; font-size:var(--fs,9.5pt); }
  .pTbl th { border:1px solid #000; background:#EFEFEF; padding:3px 3px; font-weight:700; text-align:center; }
  .pTbl td { border:1px solid #666; padding:var(--pad,3.5px) 4px; text-align:center; height:var(--row,19px); }
  .pTbl td.l { text-align:left; }
  /* 이름 칸: 왼쪽 여백 + 이름(왼쪽)/차량아이콘(오른쪽 고정) 정렬 */
  .pTbl td.pName { padding-left:10px; }
  .pName { display:flex; align-items:center; }
  .pNm { font-weight:700; font-size:var(--nm,10pt); flex:1 1 auto; }
  .pBus { flex:0 0 auto; margin-left:6px; font-size:calc(var(--nm,10pt) - 0.5pt); }
  .pTbl .clsRow td { background:#F5F5F5; font-weight:800; text-align:left; padding:3px 6px; border-top:1.6px solid #000; }
  .pTbl .subRow td { background:#FAFAFA; font-weight:700; }
  .pSign { display:flex; justify-content:flex-end; gap:26px; margin-top:10px; font-size:9.5pt; }
  .pSign span { border-bottom:1px solid #000; min-width:92px; display:inline-block; }
  .pFoot { margin-top:7px; font-size:8pt; color:#555; text-align:center; }
  .dayBtn { flex:1; padding:9px 0; border:1.5px solid var(--line); background:#fff; color:var(--sub);
            border-radius:8px; font-family:inherit; font-weight:700; font-size:14px; cursor:pointer; }
  .dayBtn.on { background:var(--blue); color:#fff; border-color:var(--blue); }
  .dupBadge { display:inline-block; font-size:10px; font-weight:800; padding:1px 6px; border-radius:99px;
              background:var(--amberSoft); color:var(--amber); margin-left:5px; vertical-align:middle; }

  /* ══ 모바일 조회 화면 ══ */
  .mDateBar { display:flex; align-items:center; gap:8px; margin-bottom:14px; }
  .mArw { width:44px; height:44px; flex:none; border:1.5px solid var(--line); background:#fff; border-radius:12px;
          font-size:22px; color:var(--blue); font-weight:700; cursor:pointer; line-height:1; }
  .mArw:disabled { opacity:.3; }
  .mDateMid { flex:1; text-align:center; background:var(--navy); color:#fff; border-radius:12px; padding:9px 8px; cursor:pointer; }
  .mDateBig { font-size:17px; font-weight:800; }
  .mDow { color:var(--navyDim); font-weight:700; }
  .mToday { background:var(--red); color:#fff; font-size:11px; font-weight:800; padding:1px 7px; border-radius:99px; margin-left:4px; vertical-align:middle; }
  .mHol { color:#FF9BA3; font-size:12px; font-weight:700; margin-top:2px; }
  .mDateGrid { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; }
  .mDateCell { border:1.5px solid var(--line); background:#fff; border-radius:9px; padding:8px 2px; font-weight:800; font-size:13px; cursor:pointer; color:var(--ink); }
  .mDateCell span { display:block; font-size:10px; color:var(--sub); font-weight:600; margin-top:2px; }
  .mDateCell.on { background:var(--blue); color:#fff; border-color:var(--blue); }
  .mDateCell.on span { color:#cdd6ee; }
  .mDateCell.today { border-color:var(--red); }

  .mStatRow { display:flex; gap:8px; margin-bottom:12px; }
  .mStat { flex:1; background:#fff; border:1.5px solid var(--line); border-radius:14px; padding:12px 6px; text-align:center; }
  .mStat.on { background:var(--greenSoft); border-color:transparent; }
  .mStat.off { background:var(--redSoft); border-color:transparent; }
  .mStat.go { background:var(--blueSoft); border-color:transparent; }
  .mStat.back { background:var(--greenSoft); border-color:transparent; }
  .mStatN { font-size:26px; font-weight:800; color:var(--ink); line-height:1.1; }
  .mStat.on .mStatN { color:var(--green); } .mStat.off .mStatN { color:var(--red); }
  .mStat.go .mStatN { color:var(--blue); } .mStat.back .mStatN { color:var(--green); }
  .mStatL { font-size:11.5px; color:var(--sub); font-weight:700; margin-top:2px; }
  .mHint { font-size:12px; color:var(--sub); background:#fff; border:1px solid var(--line); border-radius:10px; padding:9px 12px; margin-bottom:12px; }

  .mList { display:flex; flex-direction:column; gap:9px; }
  .mCard { background:#fff; border:1.5px solid var(--line); border-radius:16px; overflow:hidden; position:relative; }
  .mCard.absent { background:#FBF0F1; border-color:#F0CBCE; }
  .mCardMain { display:flex; align-items:center; gap:11px; padding:12px 13px 11px; cursor:pointer; }
  .mAvatar { width:44px; height:44px; flex:none; border-radius:50%; display:flex; align-items:center; justify-content:center;
             font-size:19px; font-weight:800; color:#fff; }
  .mAvatar.m { background:linear-gradient(135deg,#3A5BA8,#1E2A52); }
  .mAvatar.f { background:linear-gradient(135deg,#C15C8A,#8E3B63); }
  .mCard.absent .mAvatar { filter:grayscale(.7); opacity:.6; }
  .mInfo { flex:1; min-width:0; }
  .mName { font-size:16.5px; font-weight:800; display:flex; align-items:center; gap:6px; }
  .mCls { font-size:11px; font-weight:800; padding:1px 8px; border-radius:99px; }
  .mCls.a { background:var(--blueSoft); color:var(--blue); }
  .mCls.b { background:var(--greenSoft); color:var(--green); }
  .mSub { font-size:12.5px; color:var(--sub); margin-top:2px; display:flex; align-items:center; gap:5px; flex-wrap:wrap; }
  .mSub .dot { color:#D5CFC4; }
  .mId { font-family:monospace; font-weight:700; color:#8A8578; }
  .mLevel { font-size:12.5px; font-weight:700; color:var(--blue); margin-top:4px; }
  .mLevel.warn { color:var(--amber); }
  .mBadge { flex:none; }
  .bOn { background:var(--green); color:#fff; font-size:12px; font-weight:800; padding:5px 11px; border-radius:99px; }
  .bAbs { background:var(--red); color:#fff; font-size:11px; font-weight:800; padding:3px 9px; border-radius:99px; margin-left:6px; }
  .bSkip { background:var(--amber); color:#fff; font-size:11px; font-weight:800; padding:3px 9px; border-radius:99px; margin-left:6px; }
  .mNote { background:#FFFBEC; border-top:1px solid #F0E4BE; padding:8px 13px; font-size:12.5px; color:#7A6A2E; }
  .mNoteBtn { width:100%; border:none; border-top:1px solid var(--line); background:#FAF9F5; padding:9px;
              font-size:12.5px; font-weight:700; color:var(--sub); cursor:pointer; font-family:inherit; }

  .mBusRoute { border:1.5px solid var(--line); border-radius:16px; overflow:hidden; margin-bottom:12px; }
  .mBusHead { display:flex; align-items:center; gap:9px; padding:11px 13px; font-size:15px; }
  .mBusCnt { margin-left:auto; color:#fff; font-size:12.5px; font-weight:800; padding:3px 11px; border-radius:99px; }
  .mBusList { display:flex; flex-direction:column; }
  .mBusItem { display:flex; align-items:center; gap:11px; padding:11px 13px; border-top:1px solid var(--line); }
  .mBusItem.off { background:#FAF7F2; }
  .mBusItem.off .mBusName, .mBusItem.off .mBusPlace { opacity:.5; }
  .mBusTime { font-size:15px; font-weight:800; flex:none; width:52px; }
  .mBusMid { flex:1; min-width:0; }
  .mBusName { font-size:15.5px; font-weight:800; display:flex; align-items:center; }
  .mCallHint { font-size:12px; margin-left:5px; opacity:.55; }
  .mBusPlace { font-size:12.5px; color:var(--sub); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .mBusIco { flex:none; width:46px; height:46px; border-radius:13px; border:none; background:var(--greenSoft);
             font-size:22px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .mBusIco.skip { background:#FCE9B8; color:var(--amber); font-weight:800; }
  .mBusIco.dim { background:#F0EDE7; color:#C0392B; opacity:.6; }
  .mBusEmpty { padding:16px 13px; text-align:center; color:var(--sub); font-size:13px; }

  .mMealCard { background:#fff; border:1.5px solid var(--line); border-radius:16px; overflow:hidden; }
  .mMealRow { display:flex; border-top:1px solid var(--line); }
  .mMealRow:first-child { border-top:none; }
  .mMealLabel { flex:none; width:110px; background:#FBFAF7; padding:12px 13px; font-size:13px; font-weight:800; color:var(--sub); }
  .mMealVal { flex:1; padding:12px 13px; font-size:14.5px; font-weight:600; }
</style>
</head>

function migrate(o){  /* 예전 단일 캠프 구조 → 새 구조 자동 변환 */
  if(o && o.camps){
    if(!o.meta) o.meta={updatedAt:0};                     /* meta 누락 데이터 방어 */

}

var syncTimer=null;
/* 화면 아래 잠깐 떴다 사라지는 알림 */
var _toastTimer=null;

  if(!t){ t=document.createElement("div"); t.id="toastBox"; t.className="toast"; document.body.appendChild(t); }
  t.textContent=msg; t.classList.add("show");

function setSync(status, txt){
  UI.syncStatus=status;

  if(!dot) return;
  dot.style.background = status==="ok" ? "#1E7B3C" : status==="err" ? "#C0392B" : status==="busy" ? "#B07D1A" : "#C7C7CC";
  t.textContent = txt;
  /* 오류 상태면 클릭해서 접속키를 다시 넣을 수 있게 */
  var box=t.parentNode;
  if(box){
    if(status==="err"){
      box.style.cursor="pointer";
      box.title="클릭해서 접속키 다시 입력";
      box.onclick=function(){ if(confirm("접속키를 다시 입력하시겠습니까?\n(입력한 자료는 그대로 유지됩니다)")) authFail("접속키를 다시 입력해 주세요."); };
    } else { box.style.cursor=""; box.title=""; box.onclick=null; }
  }
}
function campSyncSoon(){ clearTimeout(syncTimer); syncTimer=setTimeout(campSync, 1200); }
function campSync(){
  if(!accessKey()){ setSync("idle","접속키 없음 (설정 탭에서 입력)"); return; }
  setSync("busy","저장 중…");
  var s=JSON.stringify(DB); var rows=[["JSON"]];
  for(var k=0;k<s.length;){
    var end=Math.min(k+45000, s.length);
    /* 이모지 등 2글자짜리 문자가 경계에서 쪼개지지 않게 한 글자 양보 */
    if(end<s.length){ var cc=s.charCodeAt(end-1); if(cc>=0xD800 && cc<=0xDBFF) end--; }
    rows.push([s.slice(k,end)]); k=end;
  }
  fetch(GSHEET_URL, {method:"POST", body:JSON.stringify({key:accessKey(), store:STORE, rows:rows})})
    .then(function(r){ return r.text(); })
    .then(function(t){
      if(t && t.indexOf('"AUTH"')>=0){ authFail("저장 권한이 없습니다. 접속키를 다시 입력해 주세요."); return; }
      setSync("ok","동기화 완료 "+new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"}));
    })
    .catch(function(){ setSync("err","저장 실패 (인터넷 확인)"); });
}
function campPull(first){
  if(!accessKey()){ setSync("idle","접속키 없음 (설정 탭에서 입력)"); return; }
  setSync("busy","불러오는 중…");
  fetch(GSHEET_URL+"?key="+encodeURIComponent(accessKey())+"&store="+STORE)
    .then(function(r){ return r.json(); })
    .then(function(rows){
      if(rows && rows.error==="AUTH"){ authFail("서버에서 접속키를 확인하지 못했습니다. 키가 변경되었을 수 있습니다."); return; }
      if(!rows || rows.length<2){ setSync("ok","클라우드 비어있음 (첫 저장 대기)"); if(first&&DB.camps.some(function(c){return c.students.length;})) campSyncSoon(); return; }
      var joined="";
      for(var i=0;i<rows.length;i++){
        if(rows[i][0]==="JSON" && i+1<rows.length){
          for(var j=i+1;j<rows.length;j++) joined += (rows[j][0]!=null?String(rows[j][0]):"");
          break;
        }
      }
      var remote=null; try{ remote=migrate(JSON.parse(joined)); }catch(e){}
      if(remote && remote.meta && remote.meta.updatedAt > (DB.meta.updatedAt||0)){
        var fromOther = remote.meta.lastDev && remote.meta.lastDev!==DEV_ID;
        DB=remote; pickCamp(); saveLocalOnly(); render();
        setSync("ok","최신 자료 반영 완료");
        /* 다른 기기(관리자↔사범)가 방금 수정한 경우 알려줌 — 첫 접속 때는 조용히 반영 */
        if(!first && fromOther) showToast("📥 다른 기기에서 방금 수정했습니다 — 최신 자료를 반영했어요");
      } else {
        setSync("ok","동기화 완료");
        if(remote && remote.meta && DB.meta.updatedAt > remote.meta.updatedAt) campSyncSoon();
      }
    })
    .catch(function(){ setSync("err","불러오기 실패"); });
}

/* ================= 날짜/요금 ================= */
/* 지역(한국) 시간 기준 YYYY-MM-DD — toISOString은 UTC라 하루 밀리므로 사용 금지 */
function ymd(d){
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function todayStr(){ return ymd(new Date()); }
function campDates(){
  var out=[], s=CAMP.set.start, e=CAMP.set.end;
  if(!s||!e) return out;
  var d=new Date(s+"T00:00:00"), end=new Date(e+"T00:00:00");
  while(d<=end){ var w=d.getDay(); if(w>=1&&w<=5) out.push(ymd(d)); d.setDate(d.getDate()+1); }
  return out;
}
/* 캠프 날짜를 주 단위로 묶기 (월~금, 주말 제외) */
function weekGroups(){
  var ds=campDates(), gs=[], cur=null, lastWk=null;
  ds.forEach(function(d){
    var dt=new Date(d+"T00:00:00");
    var th=new Date(dt); th.setDate(dt.getDate()+(4-((dt.getDay()+6)%7)));  /* 그 주의 목요일 */
    var wk=th.getFullYear()+"-"+th.getMonth()+"-"+Math.floor(th.getDate()/7);
    if(wk!==lastWk){ cur={ dates:[] }; gs.push(cur); lastWk=wk; }
    cur.dates.push(d);
  });
  gs.forEach(function(g,i){ g.label=(i+1)+"주차"; });
  return gs;
}
function weekStarts(){   /* 각 주 첫날 목록 (구분선 표시용) */
  var out={}; weekGroups().forEach(function(g,i){ if(i>0) out[g.dates[0]]=1; });
  return out;
}
function fmtD(s){ var d=new Date(s+"T00:00:00"); return (d.getMonth()+1)+"/"+d.getDate()+"("+"일월화수목금토"[d.getDay()]+")"; }
/* 요금 계산: 수업료(할인 적용) + 식비(할인 없음) + 차량비 */
function feeParts(s){
  /* billDays(청구 일수)가 있으면 그것으로 청구, 없으면 등록 일수 사용
     — 전 일정 청구 후 결석분 환불하는 운영 방식 지원 */
  var r=RATE(), p=PKG[s.pkg];
  var days=(s.billDays!==undefined && s.billDays!=="" && Number(s.billDays)>0) ? Number(s.billDays) : (Number(s.days)||0);
  if(!p||!days) return { tuition:0, meal:0, bus:0, total:0, discApplied:0, blocked:false };
  var per=0; p.parts.forEach(function(k){ per+=Number(r[k])||0; });
  /* 규정: 기준 일수 미만이면 할인 미적용 (청구 자동 계산에만 적용) */
  var blocked = days < (Number(r.minDays)||0);
  var d = blocked ? 0 : (Number(s.disc)||0);
  var tuition = Math.round(per*(1-d))*days;
  var meal = p.meal ? (Number(r.meal)||0)*days : 0;
  /* 차량비: 캠프 1회 정액 (형제는 50%) — 실제 운영 기준 */
  var bus=0;
  if(s.bus){
    var key = s.bus==="b1"?"bus1":s.bus==="b2"?"bus2":"bus3";
    bus = Number(r[key])||0;
    if(s.busHalf) bus = Math.round(bus*0.5);
  }
  return { tuition:tuition, meal:meal, bus:bus, total:tuition+meal+bus, discApplied:d, blocked:blocked };
}
function calcFee(s){ return feeParts(s).total; }
/* 조정 내역(환불·추가등록 등): s.adj = [{t:"환불"|"추가", n:"사유", v:금액(음수 가능)}] */
function ADJ(s){ if(!s.adj) s.adj=[]; return s.adj; }
function adjTotal(s){ var t=0; ADJ(s).forEach(function(a){ t+=Number(a.v)||0; }); return t; }
/* 납부 기록: s.pays = [{d:날짜, v:금액, n:메모}] — 여러 번 분할 납부 지원 */
function PAYS(s){ if(!s.pays) s.pays=[]; return s.pays; }
function paidTotalOf(s){ var t=0; PAYS(s).forEach(function(p){ t+=Number(p.v)||0; }); return t; }
function balanceOf(s){ return billOf(s).total - paidTotalOf(s); }
/* 청구금액(수업료+식비) / 차량비 / 조정 / 총금액 */
function billOf(s){
  var p=feeParts(s);
  var charge=p.tuition+p.meal;           /* 청구금액 (자동 계산) */
  /* 특수 사정으로 금액을 직접 정한 경우 그 값을 사용 */
  if(s.chargeSet!==undefined && s.chargeSet!=="" && Number(s.chargeSet)>0) charge=Number(s.chargeSet);
  var adj=adjTotal(s);                   /* 환불(-) · 추가등록(+) */
  return { charge:charge, bus:p.bus, adj:adj, total:charge+adj+p.bus, paid:!!s.paid, blocked:p.blocked };
}

/* ════════ 캠프생 이력 (캠프 간 동일인 매칭) ════════
   매칭 기준: ① 전화 뒤 8자리 ② 이름+생일 ③ 이름(공백·대소문자 무시) */
/* 매칭 규칙:
   ① 기본 묶음은 이름(공백·대소문자·끝의 b 무시)
   ② 같은 이름 안에서는 생일이 같으면 동일인, 생일이 다르면 다른 사람
      (전화는 형제가 공유하므로 이름이 다르면 절대 합치지 않음)
   ③ 생일 정보가 없는 기록은 원래 표기 이름(b 포함)이 같은 쪽에 붙임 */
function nkey(s){ return (s.name||"").replace(/\s/g,"").toLowerCase().replace(/[bB]$/,""); }
function rawname(s){ return (s.name||"").replace(/\s/g,"").toLowerCase(); }
function phone8(s){ var d=(s.phone||"").replace(/\D/g,""); return d.length>=8?d.slice(-8):""; }
function samePerson(a,b){
  if(nkey(a)!==nkey(b)) return false;
  if(a.birth && b.birth) return a.birth===b.birth;         /* 생일이 최우선 판정 */
  if(rawname(a)===rawname(b)) return true;                  /* 표기(b 포함)까지 같으면 동일 */
  var pa=phone8(a), pb=phone8(b);
  return !!(pa && pb && pa===pb);                           /* 표기 다르면 전화로만 연결(이유진↔이유진b) */
}
function buildHistory(){
  var recs=[];
  DB.camps.forEach(function(c){ (c.students||[]).forEach(function(s){ recs.push({camp:c, s:s}); }); });
  var clusters=[];
  recs.forEach(function(r){
    var hit=null;
    for(var i=0;i<clusters.length && !hit;i++){
      for(var j=0;j<clusters[i].length;j++){
        if(samePerson(clusters[i][j].s, r.s)){ hit=clusters[i]; break; }
      }
    }
    if(hit) hit.push(r); else clusters.push([r]);
  });
  var out=[];
  clusters.forEach(function(g){
    g.sort(function(a,b){ return (a.camp.set.start||"").localeCompare(b.camp.set.start||""); });
    var last=g[g.length-1].s;
    out.push({ name:last.name, birth:lastNonEmptyS(g,"birth"), phone:lastNonEmptyS(g,"phone"),
               school:lastNonEmptyS(g,"school"), grade:last.grade||"", recs:g,
               level:lastNonEmptyS(g,"level"), rlid:lastNonEmptyS(g,"rlid") });
  });
  out.sort(function(a,b){ return b.recs.length-a.recs.length || a.name.localeCompare(b.name,"ko"); });
  return out;
}
function lastNonEmptyS(recs,f){
  for(var i=recs.length-1;i>=0;i--){ if(recs[i].s[f]) return recs[i].s[f]; }
  return "";
}
function historyOf(stu){
  var out=[];
  DB.camps.forEach(function(c){
    (c.students||[]).forEach(function(s){
      if(s===stu) return;
      if(samePerson(stu,s)) out.push({camp:c, s:s});
    });
  });
  out.sort(function(a,b){ return (a.camp.set.start||"").localeCompare(b.camp.set.start||""); });
  return out;
}
function campAttended(rec){ /* 해당 캠프에서 실제 출석(과거는 배치=출석) 일수 */
  var n=0, c=rec.camp, s=rec.s;
  Object.keys(c.att||{}).forEach(function(d){ if(c.att[d][s.id]) n++; });
  return n || (s.plan||[]).length;
}

/* ════════ 출석부 (A/B반 · 배치 · 보강) ════════
   s.plan = 배치된 출석 예정일 배열, CAMP.att[날짜][id] = 실제 출석 체크 */
/* 출석 상태: 1=출석, 2=결석(명시), 없음=미체크 */
function attState(sid,d){ var v=(CAMP.att[d]||{})[sid]; return v===2?2:(v?1:0); }
function tapCell(id,d){
  var day=CAMP.att[d]||{};
  var cur=day[id]===2?2:(day[id]?1:0);
  /* 배치 안 된 날(안 오는 날)은 출결을 찍지 않음 — 기존 표시가 있으면 지우는 것만 허용 */
  var stu=stuById(id);
  if(stu && planOf(stu).indexOf(d)<0 && cur===0) return;
  if(cur===0) day[id]=1;        /* 1번 클릭 → 출석 */
  else if(cur===1) day[id]=2;   /* 2번 클릭 → 결석 */
  else delete day[id];          /* 3번 클릭 → 지움 */
  CAMP.att[d]=day; saveLocal(); render();
}

function planOf(s){ return s.plan||(s.plan=[]); }
function plannedCnt(s){ return planOf(s).filter(function(d){ return campDates().indexOf(d)>=0; }).length; }
function actualCnt(s){ var n=0; campDates().forEach(function(d){ if(attState(s.id,d)===1) n++; }); return n; }
/* 미배치 = 등록 일수 - 배치된 일수 (추가 등록 시 양수가 되어 경고) */
function unplaced(s){ return (Number(s.days)||0) - plannedCnt(s); }
/* 보강 필요 = 배치됐지만 결석한 날 (지난 날짜만 집계) */
function makeupCnt(s){
  var today=todayStr(), n=0;
  planOf(s).forEach(function(d){
    if(campDates().indexOf(d)<0 || isHol(d)) return;      /* 휴일은 보강 대상 아님 */
    var st=attState(s.id,d);
    if(st===2) n++;                                        /* 명시적 결석 */
    else if(st===0 && d<today) n++;                        /* 지난 날 미체크 = 결석 */
  });
  return n;
}

  /* ── 접히는 상단 영역: 경고 카드들 (인원현황은 아래로 이동) ── */
  if(!folded && (warn.length||mk.length)){
    h+='<div class="grid2" style="margin-bottom:12px">';

      '<b style="font-size:13.5px;color:var(--amber)">⚠ 추가 배치 필요 '+warn.length+'명</b> '+
      '<span class="small">'+warn.map(function(s){ return esc(s.name)+' <b>+'+unplaced(s)+'일</b>'; }).join(" · ")+'</span>'+
      '<div class="small" style="margin-top:4px">등록 일수보다 배치가 적습니다. 이름을 눌러 배치하세요.</div></div>';
    if(mk.length) h+='<div class="card" style="background:var(--redSoft);border:1.5px solid var(--red);padding:11px 14px;margin-bottom:0">'+
      '<b style="font-size:13.5px;color:var(--red)">보강 필요 '+mk.length+'명</b> '+
      '<span class="small">'+mk.map(function(s){ return esc(s.name)+' <b>'+makeupCnt(s)+'회</b>'; }).join(" · ")+'</span>'+
      '<div class="small" style="margin-top:4px">보강일을 추가 배치하면 숫자가 사라집니다.</div></div>';
    h+='</div>';
  }

  /* ── 반별 출석부 (메인) ── */
  var sheetA=clsSheet("A"), sheetB=clsSheet("B");
  h+='<div class="card" style="padding:0;overflow:hidden">'+
     '<div data-scrollkeep="att" style="overflow:auto;max-height:80vh;padding:0 14px 14px">'+sheetA+sheetB+'</div></div>';

  /* ── 일자별 인원 현황: 반별 출석부 아래로 이동 (접힘 영역) ── */
  if(!folded) h+=totalSheet();

  if(unassigned.length){
    h+='<div class="card"><h2 style="font-size:15px">반 미배치 '+unassigned.length+'명</h2><div class="grid2">'+
      unassigned.map(function(s){
        return '<div class="item" style="cursor:default;margin-bottom:0"><div><div class="nm">'+busIcon(s)+esc(s.name)+'</div><div class="sb">'+esc(s.grade||"")+' · '+s.days+'일 등록</div></div>'+
          '<div style="display:flex;gap:6px"><button class="btn" style="padding:8px 12px;font-size:13px" onclick="setStuCls(\''+s.id+'\',\'A\')">A반</button>'+
          '<button class="btn" style="padding:8px 12px;font-size:13px" onclick="setStuCls(\''+s.id+'\',\'B\')">B반</button></div></div>';
      }).join("")+'</div></div>';
  }
  return h;
}
/* ── 전체(A+B) 일자별 인원 요약 ── */
/* ══════ 일일 출석부: 화면 미리보기 + 인쇄 + 다운로드 ══════ */
function daySheetHTML(d){
  var dt=new Date(d+"T00:00:00");
  var wd=["일","월","화","수","목","금","토"][dt.getDay()];
  var total=0, body='', subs=[];
  ["A","B"].forEach(function(c){
    var list=clsList(c).filter(function(s){ return planOf(s).indexOf(d)>=0; })
      .sort(function(a,b){ return (Number(a.no)||999)-(Number(b.no)||999); });
    if(!list.length) return;
    total+=list.length; subs.push(c+"반 "+list.length+"명");
    body+='<tr class="clsRow"><td colspan="9">'+c+'반 &nbsp;<span style="font-weight:600;font-size:8.5pt">'+
      (c==="A"?"10시 체육 → 11시 영어":"10시 영어 → 11시 체육")+'</span></td></tr>';
    list.forEach(function(s){
      var st=attState(s.id,d), nt=noteOf(s.id,d);
      var busIco = s.bus ? '<span class="pBus">🚌</span>' : '';
      body+='<tr><td>'+esc(s.cls)+'</td><td>'+(s.no||"")+'</td>'+
        '<td class="l pName"><span class="pNm">'+esc(s.name)+'</span>'+busIco+'</td>'+
        '<td>'+esc((s.grade||"").replace("초등 ",""))+'</td><td>'+esc(s.gender||"")+'</td>'+
        '<td>'+esc(s.level||"")+'</td><td>'+esc(s.rlid||"")+'</td>'+
        '<td style="font-weight:700">'+(st===1?"○":st===2?"×":"")+'</td>'+
        '<td class="l" style="font-size:8.5pt">'+esc(nt)+'</td></tr>';
    });
    body+='<tr class="subRow"><td colspan="7" style="text-align:right;padding-right:8px">'+c+'반 소계</td>'+
      '<td>'+list.length+'</td><td></td></tr>';
  });
  if(!total) return null;
  /* A4 한 장에 반드시 들어가도록 인원수에 따라 행 높이·글자 크기 자동 조절
     (반 구분행 2개 + 소계 2개 + 총계 1개 ≈ 5줄 여유 포함) */
  var rows = total + subs.length*2 + 1;   /* 데이터행 + (반헤더+소계)×2 + 총계 */
  var dens;
  if(rows<=24)      dens={row:18, fs:9.5, name:10, pad:3.2};
  else if(rows<=30) dens={row:14, fs:9,   name:9.5, pad:2.3};
  else if(rows<=38) dens={row:11, fs:8.2, name:9,   pad:1.8};
  else if(rows<=46) dens={row:8.5, fs:7.5, name:8.2, pad:1.2};
  else if(rows<=56) dens={row:6.8, fs:7,  name:7.6, pad:0.9};
  else              dens={row:5.6, fs:6.4, name:7,   pad:0.6};
  var dvar='--row:'+dens.row+'px;--fs:'+dens.fs+'pt;--nm:'+dens.name+'pt;--pad:'+dens.pad+'px';
  return '<div class="pSheet" style="'+dvar+'"><div class="pHead">'+
    '<div class="pTitle">'+esc(CAMP.set.name)+' 출석부</div>'+
    '<div class="pOrg">나라차태권도 × 클래식리더영어도서관</div></div>'+
    '<div class="pMeta"><div class="d">날짜 : '+(dt.getMonth()+1)+'월 '+dt.getDate()+'일 ('+wd+'요일)'+
    (isHol(d)?' — '+esc(holName(d)):'')+'</div>'+
    '<div class="n">'+subs.join(" · ")+' &nbsp;/&nbsp; 출석 예정 <b>'+total+'명</b></div></div>'+
    '<table class="pTbl"><thead><tr>'+
    '<th style="width:6%">반</th><th style="width:6%">번</th><th style="width:16%">이름</th>'+
    '<th style="width:9%">학년</th><th style="width:8%">성별</th><th style="width:15%">영레벨</th>'+
    '<th style="width:11%">RL_ID</th><th style="width:7%">'+wd+'</th><th>비고</th></tr></thead><tbody>'+body+
    '<tr class="subRow" style="border-top:2px solid #000"><td colspan="7" style="text-align:right;padding-right:8px">총인원</td>'+
    '<td>'+total+'</td><td></td></tr></tbody></table>'+
    '<div class="pSign">담당 <span></span> 확인 <span></span></div>'+
    '<div class="pFoot">출석 ○ · 결석 × · 🚌 차량 이용 &nbsp;|&nbsp; 나라차태권도 분당도장 · 두산위브트레지움 109동 B101호</div></div>';
}
/* 화면 미리보기 창 */
function previewDay(d){
  d=d||UI.date;

  if(!body){ alert(fmtD(d)+"에 배치된 캠프생이 없습니다."); return; }
  document.getElementById("modalHost").innerHTML=
    '<div class="modalBg" onclick="if(event.target===this)closeModal()"><div class="modal" style="max-width:880px;padding:18px">'+
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">'+
    '<h2 style="margin:0;font-size:16px">출석부 미리보기 — '+fmtD(d)+'</h2>'+
    '<span style="margin-left:auto;display:flex;gap:6px">'+
    '<button class="btn" style="padding:8px 13px;font-size:13px" onclick="printDay(\''+d+'\')">🖨 인쇄 / PDF 저장</button>'+

    '<button class="btn gray" style="padding:8px 12px;font-size:13px" onclick="closeModal()">닫기</button></span></div>'+

/* 인쇄 (브라우저 인쇄창 → PDF 저장 가능) */
function printDay(d){
  d=d||UI.date;
  var body=daySheetHTML(d);
  if(!body){ alert(fmtD(d)+"에 배치된 캠프생이 없습니다."); return; }
  document.getElementById("printArea").innerHTML=body;
  setTimeout(function(){ window.print(); }, 60);
}
function printRange(){
  var ds=campDates().filter(function(d){ return !isHol(d) && daySheetHTML(d); });
  if(!ds.length){ alert("인쇄할 내용이 없습니다."); return; }
  if(!confirm("캠프 "+ds.length+"일치 출석부를 인쇄할까요? (용지 "+ds.length+"장)")) return;
  var all='';
  ds.forEach(function(d,i){
    all+='<div style="'+(i<ds.length-1?'page-break-after:always':'')+'">'+daySheetHTML(d)+'</div>';
  });
  document.getElementById("printArea").innerHTML=all;
  setTimeout(function(){ window.print(); }, 60);
}
/* 파일 다운로드 (HTML — 더블클릭하면 열리고, 워드에서도 열림) */
function downloadDay(d){
  d=d||UI.date;
  var body=daySheetHTML(d);
  if(!body){ alert(fmtD(d)+"에 배치된 캠프생이 없습니다."); return; }
  saveSheetFile(body, d.replace(/-/g,"")+"_출석부");
}
function downloadRange(){
  var ds=campDates().filter(function(d){ return !isHol(d) && daySheetHTML(d); });
  if(!ds.length){ alert("저장할 내용이 없습니다."); return; }
  var all='';
  ds.forEach(function(d,i){ all+='<div style="'+(i<ds.length-1?'page-break-after:always':'')+'">'+daySheetHTML(d)+'</div>'; });
  saveSheetFile(all, (CAMP.set.name||"캠프").replace(/[\\\/:*?"<>|]/g,"")+"_전체출석부");
}
function saveSheetFile(body, filename){
  var css=''+
    '@page{size:A4 portrait;margin:10mm 11mm}'+
    'body{font-family:"Malgun Gothic","맑은 고딕",sans-serif;color:#000;margin:0;padding:0}'+
    '.pHead{text-align:center;border-bottom:2.5px solid #000;padding-bottom:6px;margin-bottom:4px}'+
    '.pTitle{font-size:15pt;font-weight:800}.pOrg{font-size:9pt;color:#333;margin-top:3px}'+
    '.pMeta{display:flex;justify-content:space-between;align-items:flex-end;margin:7px 0 5px;font-size:10.5pt}'+
    '.pMeta .d{font-weight:800;font-size:12pt}.pMeta .n{font-size:9.5pt;color:#333}'+
    '.pTbl{width:100%;border-collapse:collapse;font-size:var(--fs,9.5pt)}'+
    '.pTbl th{border:1px solid #000;background:#EFEFEF;padding:3px 3px;font-weight:700;text-align:center}'+
    '.pTbl td{border:1px solid #666;padding:var(--pad,3.5px) 4px;text-align:center;height:var(--row,19px)}'+
    '.pTbl td.l{text-align:left}'+
    '.pTbl td.pName{padding-left:10px}'+
    '.pName{display:flex;align-items:center}'+
    '.pNm{font-weight:700;font-size:var(--nm,10pt);flex:1 1 auto}'+
    '.pBus{flex:0 0 auto;margin-left:6px;font-size:calc(var(--nm,10pt) - 0.5pt)}'+
    '.pTbl .clsRow td{background:#F5F5F5;font-weight:800;text-align:left;padding:3px 6px;border-top:1.6px solid #000}'+
    '.pTbl .subRow td{background:#FAFAFA;font-weight:700}'+
    '.pSign{display:flex;justify-content:flex-end;gap:26px;margin-top:10px;font-size:9.5pt}'+
    '.pSign span{border-bottom:1px solid #000;min-width:92px;display:inline-block}'+
    '.pFoot{margin-top:7px;font-size:8pt;color:#555;text-align:center}';
  var html='<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">'+
    '<title>'+esc(filename)+'</title><style>'+css+'</style></head><body>'+body+'</body></html>';
  try{
    var blob=new Blob(["\uFEFF"+html],{type:"text/html;charset=utf-8"});
    var a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=filename+".html";
    document.body.appendChild(a); a.click();
    setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(a.href); }, 500);
  }catch(e){ alert("다운로드에 실패했습니다. ‘인쇄 / PDF 저장’을 이용해 주세요."); }
}

function totalSheet(){
  var ds=campDates(), C=COL(), wstart=weekStarts(), today=todayStr(), wg=weekGroups();
  var A=clsList("A"), B=clsList("B"), all=A.concat(B);
  function cnt(list,d,kind){
    if(kind==="plan") return list.filter(function(s){ return planOf(s).indexOf(d)>=0; }).length;
    if(kind==="att")  return list.filter(function(s){ return attState(s.id,d)===1; }).length;
    return list.filter(function(s){
      var pl=planOf(s).indexOf(d)>=0, st=attState(s.id,d);
      return pl && (st===2 || (st===0 && d<today));
    }).length;
  }
  var tPlan=0,tAtt=0;
  ds.forEach(function(d){ if(!isHol(d)){ tPlan+=cnt(all,d,"plan"); tAtt+=cnt(all,d,"att"); } });
  var todayIdx = ds.indexOf(today);
  var h='<div class="card" style="padding:0;overflow:hidden;border-top:4px solid var(--navy)">'+
    '<div style="display:flex;align-items:baseline;gap:14px;padding:12px 14px 9px;flex-wrap:wrap">'+
    '<h2 style="margin:0">일자별 인원 현황 <span class="small" style="font-weight:600;color:var(--sub)">전체 '+all.length+'명 (A '+A.length+' · B '+B.length+')</span></h2>'+
    (todayIdx>=0?'<span class="tag" style="background:var(--blueSoft);color:var(--blue)">오늘 '+fmtD(today)+' 출석 <b>'+cnt(all,today,"att")+'</b> / 배치 <b>'+cnt(all,today,"plan")+'</b>명</span>':'')+
    '<span class="small" style="margin-left:auto">배치 연인원 <b>'+tPlan+'</b> · 출석 연인원 <b style="color:var(--green)">'+tAtt+'</b> · 출석률 <b>'+(tPlan?Math.round(tAtt/tPlan*100):0)+'%</b></span></div>'+
    '<div style="overflow:auto;padding:0 14px 12px"><table class="sheet" style="width:100%">'+
    '<thead><tr><th class="hdrInfo" style="min-width:96px;position:sticky;left:0;z-index:3">구분</th>';
  ds.forEach(function(d){
    var dd=new Date(d+"T00:00:00"), hol=isHol(d), mon=dd.getDay()===1;
    if(C[d]){ h+='<th class="'+(wstart[d]?'wk ':'')+'hdrDay" style="min-width:18px;cursor:pointer;background:#E4E0D6;color:#8B8578;font-weight:800" onclick="toggleCol(\''+d+'\',event)" title="'+esc(colTip(d))+'">▸</th>'; return; }
    h+='<th class="'+(wstart[d]?'wk ':'')+(hol?'cHol':(mon?'hdrMon':'hdrDay'))+'"'+
       (d===today?' style="box-shadow:inset 0 -3px 0 #2B5FB8"':'')+'>'+(dd.getMonth()+1)+'/'+dd.getDate()+
       '<div style="font-weight:600;font-size:10px;color:'+(hol?'#B5343F':'#6B7280')+'">'+
       (hol?esc(holName(d)).slice(0,4):"일월화수목금토"[dd.getDay()])+'</div></th>';
  });
  h+='<th class="wk hdrSum">합계</th></tr></thead><tbody>';
  var rows=[
    ["A반 배치",A,"plan","#6B7280",false],["A반 출석",A,"att","#2B5FB8",true],
    ["B반 배치",B,"plan","#6B7280",false],["B반 출석",B,"att","#1E7B3C",true],
    ["전체 배치",all,"plan","#4A4A4A",false],["전체 출석",all,"att","#1E7B3C",true],
    ["전체 결석",all,"abs","#B5343F",false]
  ];
  rows.forEach(function(r,i){
    var isTot=(i>=4), bg=isTot?'#F3F1EA':(i<2?'#F7FAFF':'#F5FBF6');
    h+='<tr'+(isTot?' class="sumRow"':'')+'>'+
      '<td class="lft" style="position:sticky;left:0;background:'+bg+';font-weight:'+(r[4]?'800':'600')+';color:'+r[3]+'">'+r[0]+'</td>';
    var t=0;
    ds.forEach(function(d){
      if(C[d]){ h+='<td class="'+(wstart[d]?'wk':'')+'" style="background:'+bg+'"></td>'; return; }
      if(isHol(d)){ h+='<td class="'+(wstart[d]?'wk ':'')+'cHol">/</td>'; return; }
      var n=cnt(r[1],d,r[2]); t+=n;
      h+='<td class="'+(wstart[d]?'wk':'')+'" style="background:'+bg+';color:'+r[3]+';font-weight:'+(r[4]?'800':'600')+'">'+(n||"")+'</td>';
    });
    h+='<td class="wk" style="background:'+bg+';color:'+r[3]+';font-weight:800">'+(t||"")+'</td></tr>';
  });
  h+='</tbody></table></div></div>';
  return h;
}
function clsSheet(c){

    '<b style="background:#1E7B3C;color:#fff;padding:1px 6px;border-radius:4px">✓ 출석</b> '+
    '<b style="background:#C0392B;color:#fff;padding:1px 6px;border-radius:4px">✕ 결석</b> '+
    '<b style="background:#555047;color:#fff;padding:1px 6px;border-radius:4px">－ 결석(미체크)</b> '+
    '<b style="background:#B3ADA2;color:#5E594F;padding:1px 6px;border-radius:4px">안 오는 날</b> '+
    '<b style="background:#F7FAFF;color:#8595AD;padding:1px 6px;border-radius:4px;border:1px solid #E3E9F2">· 배치</b>'+
    ' &nbsp;1클릭 출석 · 2클릭 결석 · 우클릭 메모</span>'+
    (colCnt?'<button class="btn line" style="padding:5px 10px;font-size:11.5px" onclick="expandAll()">접힌 '+colCnt+'일 펼치기</button>':''):'')+
    '</div>'+
    '<table class="sheet" style="table-layout:fixed;width:'+

  /* 열 폭 고정: 인적사항 9칸 + 날짜칸(균일) + 집계 3칸 → A·B반이 동일 폭으로 정렬됨 */

function togglePlan(d){
  var s=null; CAMP.students.forEach(function(x){ if(x.id===UI.plan) s=x; });
  if(!s) return;
  var p=planOf(s), i=p.indexOf(d);
  if(i>=0) p.splice(i,1); else p.push(d);
  p.sort(); saveLocal(); renderPlan(); 
}
function setStuNo(id,v){ CAMP.students.forEach(function(s){ if(s.id===id) s.no=Number(v)||0; }); saveLocal(); }
function fillPlan(){
  var s=null; CAMP.students.forEach(function(x){ if(x.id===UI.plan) s=x; });
  if(!s) return;
  var ds=campDates(), p=planOf(s), need=(Number(s.days)||0)-p.length;
  if(need<=0){ alert("이미 등록 일수만큼 배치되어 있습니다."); return; }
  for(var i=0;i<ds.length && need>0;i++){ if(p.indexOf(ds[i])<0){ p.push(ds[i]); need--; } }
  p.sort(); saveLocal(); renderPlan();
}
function closePlan(){ UI.plan=null; document.getElementById("modalHost").innerHTML=""; render(); }

/* ════════ 차량 운행표 ════════
   CAMP.routes = [ {name, dir:"등원"|"하원", stops:[{t,place,grade,name,sid}]} ] */
function ROUTES(){ if(!CAMP.routes) CAMP.routes=[]; return CAMP.routes; }
function stuById(id){ var r=null; CAMP.students.forEach(function(s){ if(s.id===id) r=s; }); return r; }

/* ── 요일 유틸 ──
   dowOf("2026-07-27") => 1(월) ~ 5(금).  일=0, 토=6 */
function dowOf(d){ return new Date(d+"T00:00:00").getDay(); }
var DOW_KO = ["일","월","화","수","목","금","토"];
/* 정류장의 '태우는 요일': st.days = [1,3,4] 처럼 요일번호 배열.
   비어 있으면(=지정 안 함) 모든 요일에 태우는 것으로 간주(기존 동작 유지). */
function stopRunsOn(st, d){
  if(!st.days || !st.days.length) return true;   /* 요일 지정 없음 → 매일 */
  return st.days.indexOf(dowOf(d)) >= 0;
}
/* 정류장의 '태우는 요일'을 사람이 읽는 문구로: [1,3,4] => "월수목" */
function daysLabel(st){
  if(!st.days || !st.days.length) return "";
  return st.days.slice().sort().map(function(n){ return DOW_KO[n]; }).join("");
}
/* "09:13" → 553(분).  시간이 없으면 아주 큰 값(맨 뒤로) */
function timeMin(t){
  if(!t) return 999999;
  var m=String(t).match(/(\d{1,2})\s*[:시]\s*(\d{1,2})?/);
  if(!m) return 999999;
  return Number(m[1])*60 + Number(m[2]||0);
}
/* 정류장을 시간순으로 정렬한 새 배열 반환 (원본 순서는 보존, 표시용 인덱스는 따로 관리).
   같은 시간이면 원래 순서 유지. */
function sortedStops(rt){
  return rt.stops.map(function(st,i){ return {st:st, i:i}; })
    .sort(function(a,b){
      var ta=timeMin(a.st.t), tb=timeMin(b.st.t);
      if(ta!==tb) return ta-tb;
      return a.i-b.i;      /* 시간 같으면 입력 순서 유지 */
    });
}
function ridesToday(d){ /* 그날 탑승 예정: 배치된 날 + 차량 이용 */
  var n=0; CAMP.students.forEach(function(s){ if(s.bus && planOf(s).indexOf(d)>=0) n++; });
  return n;
}
/* ── 명단↔차량표 불일치 탐지: ①명단에 없는 이름 ②연결 끊김 ③차량 미신청인데 노선에 있음 ── */
function busMismatches(){
  var out={unknown:[], broken:[], notRider:[]};
  (ROUTES()||[]).forEach(function(rt){
    (rt.stops||[]).forEach(function(st){
      if(!st.name) return;                                        /* 구분선(도착 등) */
      if(/도착|탑승|사범|하원차|등원차/.test(st.name)) return;      /* 라벨 행 제외 */
      if(!st.sid){
        /* 이름이 명단과 정확히 일치하면 미연결일 뿐이므로 제외, 명단에 아예 없으면 경고 */
        var hit=CAMP.students.some(function(s){ return nkey(s)===nkey({name:st.name}); });
        if(!hit) out.unknown.push({rt:rt.name, st:st});
        return;
      }
      var s=stuById(st.sid);
      if(!s){ out.broken.push({rt:rt.name, st:st}); return; }
      if(!s.bus) out.notRider.push({rt:rt.name, st:st, s:s});
    });
  });
  return out;
}
function busMismatchCount(){ var m=busMismatches(); return m.unknown.length+m.broken.length+m.notRider.length; }

function vBus(){
  var ds=campDates(), rts=ROUTES(), today=todayStr();
  var riders=CAMP.students.filter(function(s){return s.bus;});
  var inRoute={}; rts.forEach(function(rt){ rt.stops.forEach(function(st){ if(st.sid) inRoute[st.sid]=1; }); });
  var miss=riders.filter(function(s){ return !inRoute[s.id]; });
  /* 같은 방향(등원/하원) 안에서 한 학생이 여러 정류장에 걸쳐 있으면 '중복(요일별 위치)' 으로 봄 */
  var dirCount={};   /* dirCount[방향][학생id] = 정류장 수 */
  rts.forEach(function(rt){
    var dc=dirCount[rt.dir]||(dirCount[rt.dir]={});
    rt.stops.forEach(function(st){ if(st.sid){ dc[st.sid]=(dc[st.sid]||0)+1; } });
  });

  var h='<div style="display:flex;align-items:center;gap:14px;margin-bottom:12px;flex-wrap:wrap">'+
    '<h2 style="margin:0">차량 운행표</h2>'+
    '<span class="small">차량 이용 <b>'+riders.length+'명</b> · 노선 <b>'+rts.length+'개</b></span>'+
    '<span class="small" style="margin-left:auto">'+
      '🚌 <span style="color:var(--blue);font-weight:700">등원 승차</span> · '+
      '🚐 <span style="color:var(--green);font-weight:700">하원 하차</span> · '+
      '<span style="color:#B07D1A;font-weight:700">✕ 제외</span>(출석하지만 차량 안 탐)</span>'+
    '<button class="btn line" style="padding:8px 12px;font-size:12.5px" onclick="addRoute()">＋ 노선</button></div>'+
    '<div class="small" style="margin:-4px 0 12px;color:var(--sub)">오늘 <b>누가 어디서 타는지</b> 확인하는 표입니다. 차량 아이콘이 있으면 탑승 예정 · 아래 인원 수는 실제 탈 사람만 자동 집계됩니다. 출석했지만 차량을 안 타는 사람은 <b>칸을 눌러</b> 제외하세요. (결석은 출석부에서 처리하면 자동으로 빠집니다)</div>';

  if(miss.length) h+='<div class="card" style="background:var(--amberSoft);border:1.5px solid var(--amber);padding:11px 14px">'+
    '<b style="font-size:13.5px;color:var(--amber)">⚠ 노선 미배정 '+miss.length+'명</b> '+
    '<span class="small">'+miss.map(function(s){ return esc(s.name)+(s.stop?'('+esc(s.stop)+')':''); }).join(" · ")+'</span></div>';

  /* ── 명단↔차량표 불일치 경고 (예: 명단에 없는 이름이 노선에 남아있는 경우) ── */
  var mm=busMismatches();
  if(mm.unknown.length||mm.broken.length||mm.notRider.length){
    h+='<div class="card" style="background:var(--redSoft);border:1.5px solid var(--red);padding:11px 14px">'+
      '<b style="font-size:13.5px;color:var(--red)">🚨 차량표 확인 필요 '+busMismatchCount()+'건</b><div class="small" style="margin-top:4px;line-height:1.8">';
    if(mm.unknown.length) h+='<b>등록 명단에 없는 이름:</b> '+mm.unknown.map(function(o){
      return esc(o.st.name)+' <span style="color:var(--sub)">('+esc(o.rt)+(o.st.t?' '+esc(o.st.t):'')+')</span>'; }).join(' · ')+
      ' — 지난 캠프 잔재이거나 아직 미등록일 수 있어요. 노선에서 [수정]으로 확인해 주세요.<br>';
    if(mm.broken.length) h+='<b>연결이 끊긴 정류장:</b> '+mm.broken.map(function(o){ return esc(o.st.name)+'('+esc(o.rt)+')'; }).join(' · ')+'<br>';
    if(mm.notRider.length) h+='<b>차량 미신청인데 노선에 있음:</b> '+mm.notRider.map(function(o){ return esc(o.s.name)+'('+esc(o.rt)+')'; }).join(' · ');
    h+='</div></div>';
  }

  if(!rts.length) return h+'<div class="empty">등록된 노선이 없습니다. ‘＋ 노선’으로 추가하세요.</div>';

  /* ── 선택한 날짜 기준 승차/하차 총 인원 요약 ── */
  var selDay = UI.date;
  var goSum=0, backSum=0;
  rts.forEach(function(rt){ var n=routeRideCount(rt, selDay);
    if(rt.dir==="등원") goSum+=n; else backSum+=n; });
  h+='<div class="card" style="display:flex;align-items:center;gap:12px;padding:12px 14px;flex-wrap:wrap">'+
    '<span class="small" style="font-weight:700">날짜</span>'+
    '<select class="input" style="width:auto;padding:7px 11px;font-size:13px" onchange="UI.date=this.value;render()">'+
    campDates().map(function(d){ return '<option value="'+d+'"'+(selDay===d?" selected":"")+'>'+fmtD(d)+(isHol(d)?" · 휴일":"")+'</option>'; }).join("")+
    '</select>'+
    '<div style="margin-left:auto;display:flex;gap:10px">'+
      '<div style="background:var(--blueSoft);border-radius:10px;padding:8px 16px;text-align:center;min-width:96px">'+
        '<div class="small" style="color:var(--blue);font-weight:700">🚌 승차(등원)</div>'+
        '<div style="font-size:22px;font-weight:800;color:var(--blue)">'+goSum+'<span style="font-size:12px;font-weight:600">명</span></div></div>'+
      '<div style="background:var(--greenSoft);border-radius:10px;padding:8px 16px;text-align:center;min-width:96px">'+
        '<div class="small" style="color:var(--green);font-weight:700">🚐 하차(하원)</div>'+
        '<div style="font-size:22px;font-weight:800;color:var(--green)">'+backSum+'<span style="font-size:12px;font-weight:600">명</span></div></div>'+
    '</div></div>';

  var wstart=weekStarts();
  /* 모든 노선을 하나의 가로 스크롤 안에 → 좌우 스크롤 시 함께 움직이고 날짜가 위아래로 정렬됨 */
  var busTblW = 56+230+88+46 + 34*ds.length + 52+64;
  h+='<div class="card" style="padding:0;overflow:hidden"><div data-scrollkeep="bus" style="overflow:auto;max-height:76vh;padding:0 0 10px">';
  rts.forEach(function(rt,ri){
    var sidStopCount = dirCount[rt.dir]||{};   /* 이 노선 방향 안에서의 학생별 정류장 수 */
    var isGo = rt.dir==="등원";
    /* 등원=파랑 계열, 하원=초록 계열로 카드 전체를 차별화 */
    var accent = isGo ? "var(--blue)" : "var(--green)";
    var accentSoft = isGo ? "var(--blueSoft)" : "var(--greenSoft)";
    h+='<div style="background:'+accentSoft+';border-left:5px solid '+accent+(ri>0?';margin-top:16px':'')+'">'+
      '<div style="position:sticky;left:0;display:inline-flex;align-items:center;gap:10px;padding:11px 13px;max-width:100%;flex-wrap:wrap">'+
      '<span style="font-size:17px">'+(isGo?"🚌":"🏠")+'</span>'+
      '<h2 style="margin:0;font-size:15px;color:'+accent+'">'+esc(rt.name)+'</h2>'+
      '<span class="tag" style="background:'+accent+';color:#fff">'+esc(rt.dir)+'</span>'+
      '<span class="small">정류장 '+rt.stops.filter(function(x){return x.name;}).length+'곳</span>'+
      '<span class="tag" style="background:#fff;color:'+accent+';border:1.5px solid '+accent+';font-size:12px">'+
        fmtShort(selDay)+' '+(isGo?'승차':'하차')+' <b>'+routeRideCount(rt,selDay)+'명</b></span>'+
      '<span style="margin-left:auto;display:flex;gap:5px">'+
      '<button class="btn line" style="padding:6px 10px;font-size:12px" onclick="addStop('+ri+')">＋ 정류장</button>'+
      (isAdmin()?'<button class="btn red" style="padding:6px 9px;font-size:12px" onclick="delRoute('+ri+')">노선 삭제</button>':'')+
      '</span></div></div>'+
      '<table class="sheet" style="table-layout:fixed;width:'+busTblW+'px">'+
      '<colgroup><col style="width:56px"><col style="width:230px"><col style="width:88px"><col style="width:46px">'+
      ds.map(function(){ return '<col style="width:34px">'; }).join("")+
      '<col style="width:52px"><col style="width:64px"></colgroup>'+
      '<thead><tr>'+
      '<th>시간</th><th class="lft">승하차 장소</th>'+
      '<th style="position:sticky;left:0;z-index:7;background:#FBFAF7">이름</th><th>학년</th>';
    ds.forEach(function(d){
      var dd=new Date(d+"T00:00:00"), mon=dd.getDay()===1, hol=isHol(d);
      h+='<th class="dcell '+(wstart[d]?'wk ':'')+(hol?'cHol':(mon?'hdrMon':'hdrDay'))+'"'+
         (d===selDay?' style="box-shadow:inset 0 -3px 0 '+accent+';outline:2px solid '+accent+';outline-offset:-2px"':'')+'>'+
         (dd.getMonth()+1)+'/'+dd.getDate()+
         '<div style="font-weight:600;font-size:10px;color:'+(hol?'#B5343F':'#6B7280')+'">'+
         (hol?esc(holName(d)).slice(0,3):"일월화수목금토"[dd.getDay()])+'</div></th>';
    });
    h+='<th class="hdrSum">탑승계</th><th>수정</th></tr></thead><tbody>';
    /* ── 시간순으로 정렬해서 표시 (원본 인덱스 si는 수정·삭제용으로 보존) ── */
    var rowIdx=0;
    sortedStops(rt).forEach(function(o){
      var st=o.st, si=o.i;
      if(!st.name){   /* 이름 없는 구분선 (도장 도착 등) */
        h+='<tr style="background:#F1EEE7"><td style="color:var(--sub);font-weight:700">'+esc(st.t||"")+'</td>'+
           '<td class="lft small" colspan="'+(ds.length+4)+'">'+esc(st.place||"도착")+'</td>'+
           '<td><button class="btn red" style="padding:4px 7px;font-size:11px" onclick="delStop('+ri+','+si+')">×</button></td></tr>';
        return;
      }
      var stripe = (rowIdx++ %2)===1;
      var stu=st.sid&&stuById(st.sid);
      var dupN = st.sid ? sidStopCount[st.sid] : 0;
      var dl = daysLabel(st);
      var cnt=0;
      var cells="";
      ds.forEach(function(d){
        var runs = stu && stopRunsOn(st, d) && planOf(stu).indexOf(d)>=0;  /* 이 정류장이 그날 태우는 대상인가 */
        var aState = st.sid ? attState(st.sid, d) : 0;   /* 출결: 1출석 2결석 0미체크 */
        var skip = st.sid && isBusSkip(st.sid, d);       /* 차량 제외 여부 */
        var cls, inner, onTap="";
        if(!runs){                          /* 이 요일엔 이 정류장에서 안 태움 */
          cls='cAbs'; inner='<span style="color:#C9C4BA">·</span>';
        } else if(aState===2){              /* 결석 → 안 탐 (짙은 회색으로 명확히) */
          cls='cGone'; inner='<span title="결석">✕</span>';
        } else if(skip){                    /* 출석했지만 차량제외 → 안 탐 (끈 상태) */
          cls='cBusSkip'; inner='<span title="차량 제외 (탭하면 다시 켜기)">✕</span>'; onTap="toggleBusSkip";
        } else {                            /* 탈 예정 (출석 또는 미체크) → 진한 차량 아이콘 */
          cls='cBusOn'; inner=busGlyph(isGo); onTap="toggleBusSkip"; cnt++;
        }
        cells+='<td class="dcell '+(wstart[d]?'wk ':'')+cls+'" '+
               (onTap?'onclick="'+onTap+'(\''+st.sid+'\',\''+d+'\')" title="탭하면 차량 제외/복원" ':'')+
               'style="'+(onTap?'cursor:pointer;':'')+'font-weight:700;font-size:15px">'+inner+'</td>';
      });
      h+='<tr'+(stripe?' class="stripe"':'')+'><td style="font-weight:700;color:'+accent+'">'+esc(st.t||"")+'</td>'+
         '<td class="lft" style="max-width:220px;overflow:hidden;text-overflow:ellipsis">'+esc(st.place||"")+
           (dl?' <span class="small" style="color:'+accent+';font-weight:700">['+esc(dl)+']</span>':'')+'</td>'+
         '<td class="lft"'+(st.sid?' data-sid="'+st.sid+'"':'')+' style="position:sticky;left:0;background:#fff;font-weight:700;z-index:1">'+esc(st.name)+
         (dupN>1?'<span class="dupBadge" title="요일별로 위치가 다른 학생 (여러 정류장에 표시됨)">중복</span>':'')+
         (stu?'':' <span class="small" style="color:var(--red)">(미연결)</span>')+'</td>'+
         '<td>'+esc(st.grade||"")+'</td>'+cells+
         '<td class="hdrSum" style="font-weight:800">'+cnt+'</td>'+
         '<td><button class="btn line" style="padding:4px 8px;font-size:11px" onclick="editStop('+ri+','+si+')">수정</button></td></tr>';
    });
    h+='<tr><td colspan="4" class="lft" style="font-weight:800;background:#FBFAF7">'+(isGo?'승차 인원':'하차 인원')+'</td>';
    ds.forEach(function(d){
      var n=rt.stops.filter(function(st){
        /* 그날 태우는 정류장 + 결석 아님 + 차량제외 아님 = 실제 탑승 예정 */
        if(!(st.sid && stopRunsOn(st,d) && planOf(stuById(st.sid)||{indexOf:function(){return -1;}}).indexOf(d)>=0)) return false;
        if(attState(st.sid,d)===2) return false;     /* 결석 */
        if(isBusSkip(st.sid,d)) return false;        /* 차량제외 */
        return true;
      }).length;
      h+='<td class="dcell '+(wstart[d]?'wk ':'')+'hdrSum" style="font-weight:800;font-size:14px;color:'+accent+'">'+(n||'0')+'</td>';
    });
    h+='<td class="hdrSum"></td><td class="hdrSum"></td></tr></tbody></table>';
  });
  h+='</div></div>';
  return h;
}

/* ══════════════════ 모바일 조회 화면 ══════════════════ */

/* 모바일 상단: 날짜 선택 바 (좌우 이동 + 드롭다운) */
function mDateBar(){
  var ds=campDates(), i=ds.indexOf(UI.date);
  var prev = i>0 ? ds[i-1] : "";
  var next = i>=0 && i<ds.length-1 ? ds[i+1] : "";
  var dd=new Date(UI.date+"T00:00:00");
  var isToday = UI.date===todayStr();
  return '<div class="mDateBar">'+
    '<button class="mArw" '+(prev?'onclick="pickDate(\''+prev+'\')"':'disabled')+'>‹</button>'+
    '<div class="mDateMid" onclick="mDatePop()">'+
      '<div class="mDateBig">'+(dd.getMonth()+1)+'월 '+dd.getDate()+'일 <span class="mDow">('+"일월화수목금토"[dd.getDay()]+')</span>'+
      (isToday?' <span class="mToday">오늘</span>':'')+'</div>'+
      (isHol(UI.date)?'<div class="mHol">'+esc(holName(UI.date))+'</div>':'')+'</div>'+
    '<button class="mArw" '+(next?'onclick="pickDate(\''+next+'\')"':'disabled')+'>›</button>'+
  '</div>';
}
function mDatePop(){
  var ds=campDates();
  var h='<div class="modalBg" onclick="if(event.target===this)closeModal()"><div class="modal" style="max-width:340px">'+
    '<h2>날짜 선택</h2><div class="mDateGrid">';
  ds.forEach(function(d){
    var dd=new Date(d+"T00:00:00");
    h+='<button class="mDateCell'+(UI.date===d?" on":"")+(d===todayStr()?" today":"")+'" onclick="pickDate(\''+d+'\');closeModal()">'+
       (dd.getMonth()+1)+'/'+dd.getDate()+'<span>'+"일월화수목금토"[dd.getDay()]+'</span></button>';
  });
  h+='</div><button class="btn gray full" style="margin-top:12px" onclick="closeModal()">닫기</button></div></div>';
  document.getElementById("modalHost").innerHTML=h;
}

/* ── 모바일 · 오늘 출석 ──
   오늘 출석 예정자만 카드로. 이름·학년·성별·아이디·레벨 표시.
   탭 = 출석↔결석 토글, 메모 버튼 별도. */
function mAtt(){
  var d=UI.date;
  var todays=CAMP.students.filter(function(s){ return planOf(s).indexOf(d)>=0; })
    .sort(function(a,b){ return (a.cls||"").localeCompare(b.cls||"")|| (a.name).localeCompare(b.name,"ko"); });
  var present=todays.filter(function(s){ return attState(s.id,d)!==2; }).length;
  var absent=todays.filter(function(s){ return attState(s.id,d)===2; }).length;

  var h=mDateBar();
  if(!todays.length) return h+'<div class="empty" style="margin-top:20px">오늘 출석 예정인 캠프생이 없습니다.</div>';

  h+='<div class="mStatRow">'+
    '<div class="mStat"><div class="mStatN">'+todays.length+'</div><div class="mStatL">예정</div></div>'+
    '<div class="mStat on"><div class="mStatN">'+present+'</div><div class="mStatL">출석</div></div>'+
    '<div class="mStat off"><div class="mStatN">'+absent+'</div><div class="mStatL">결석</div></div>'+
  '</div>';
  h+='<div class="mHint">이름을 누르면 <b>출석 ↔ 결석</b>이 바뀝니다. 메모는 <b>✎</b> 버튼을 누르세요.</div>';

  h+='<div class="mList">';
  todays.forEach(function(s){
    var st=attState(s.id,d);      /* 1출석 2결석 */
    var absent = st===2;
    var nt=noteOf(s.id,d);
    var lv=s.level||"";
    var needLv=(!lv||/레테|모름|대기|첫날|테스트/.test(lv));
    h+='<div class="mCard'+(absent?" absent":"")+'">'+
       '<div class="mCardMain" onclick="tapAttMobile(\''+s.id+'\')">'+
         '<div class="mAvatar '+(s.gender==="여"?"f":"m")+'">'+esc(s.name.slice(0,1))+'</div>'+
         '<div class="mInfo">'+
           '<div class="mName">'+esc(s.name)+
             '<span class="mCls '+(s.cls==="A"?"a":"b")+'">'+esc(s.cls||"-")+'</span>'+
           '</div>'+
           '<div class="mSub">'+
             '<span>'+esc((s.grade||"").replace("초등 ","").replace("학년","").trim()||"-")+'학년</span>'+
             '<span class="dot">·</span><span>'+esc(s.gender||"-")+'</span>'+
             '<span class="dot">·</span><span class="mId">'+esc(s.rlid||"-")+'</span>'+
           '</div>'+
           '<div class="mLevel'+(needLv?" warn":"")+'">📖 '+(lv?esc(lv):'레벨 미정')+'</div>'+
         '</div>'+
         '<div class="mBadge">'+(absent?'<span class="bAbs">결석</span>':'<span class="bOn">출석</span>')+'</div>'+
       '</div>'+
       (nt?'<div class="mNote">📝 '+esc(nt)+'</div>':'')+
       '<button class="mNoteBtn" onclick="editNote(\''+s.id+'\',\''+d+'\')">✎ 메모</button>'+
     '</div>';
  });
  h+='</div>';
  return h;
}
/* 모바일 출석 탭: 미체크/출석 → 결석, 결석 → 출석 (2단계만, 간단하게) */
function tapAttMobile(id){
  var d=UI.date, day=CAMP.att[d]||{};
  if(day[id]===2) day[id]=1;   /* 결석 → 출석 */
  else day[id]=2;              /* 출석·미체크 → 결석 */
  CAMP.att[d]=day; saveLocal(); render();
}

/* ── 모바일 · 차량 (오늘 승차/하차 명단) ── */
function mBus(){
  var d=UI.date, rts=ROUTES();
  var h=mDateBar();
  if(!rts.length) return h+'<div class="empty" style="margin-top:20px">등록된 노선이 없습니다.</div>';

  var goSum=0, backSum=0;
  rts.forEach(function(rt){ var n=routeRideCount(rt,d); if(rt.dir==="등원") goSum+=n; else backSum+=n; });
  h+='<div class="mStatRow">'+
    '<div class="mStat go"><div class="mStatN">🚌 '+goSum+'</div><div class="mStatL">승차(등원)</div></div>'+
    '<div class="mStat back"><div class="mStatN">🚐 '+backSum+'</div><div class="mStatL">하차(하원)</div></div>'+
  '</div>';

  rts.forEach(function(rt){
    var isGo=rt.dir==="등원";
    var accent=isGo?"var(--blue)":"var(--green)";
    var accentSoft=isGo?"var(--blueSoft)":"var(--greenSoft)";
    /* 그날 타는 사람만, 시간순 */
    var riders=sortedStops(rt).filter(function(o){
      var st=o.st;
      if(!st.sid || !st.name || !stopRunsOn(st,d)) return false;
      var s=stuById(st.sid); if(!s||planOf(s).indexOf(d)<0) return false;
      return true;
    });
    h+='<div class="mBusRoute" style="border-color:'+accentSoft+'">'+
       '<div class="mBusHead" style="background:'+accentSoft+';border-left:5px solid '+accent+'">'+
       '<span style="font-size:16px">'+(isGo?"🚌":"🏠")+'</span>'+
       '<b style="color:'+accent+'">'+esc(rt.name)+'</b>'+
       '<span class="mBusCnt" style="background:'+accent+'">'+routeRideCount(rt,d)+'명</span></div>';
    if(!riders.length){ h+='<div class="mBusEmpty">오늘 이 노선에 타는 캠프생이 없습니다.</div></div>'; return; }
    h+='<div class="mBusList">';
    riders.forEach(function(o){
      var st=o.st, s=stuById(st.sid);
      var absent=attState(st.sid,d)===2, skip=isBusSkip(st.sid,d);
      var off=absent||skip;
      h+='<div class="mBusItem'+(off?" off":"")+'">'+
         '<div class="mBusTime" style="color:'+accent+'">'+esc(st.t||"–")+'</div>'+
         '<div class="mBusMid">'+
           '<div class="mBusName" onclick="callGuardian(\''+(s?s.id:"")+'\')" style="cursor:pointer">'+esc(s?s.name:st.name)+
             (s&&s.phone?' <span class="mCallHint">📞</span>':'')+

/* 보호자 전화번호 추출: "부/010-6671-2382 , 모/010-9913-9775" 같은 형태에서 첫 번호만 뽑음 */
function firstPhone(raw){
  if(!raw) return "";
  var nums = String(raw).match(/01[0-9][-. ]?\d{3,4}[-. ]?\d{4}/g);
  if(nums && nums.length) return nums[0].replace(/[^0-9]/g,"");
  var d = String(raw).replace(/[^0-9]/g,"");
  return d.length>=9 ? d : "";
}
/* 모바일 차량: 이름 탭 → "보호자에게 전화할까요?" 확인 → 예를 누르면 전화 연결 */
function callGuardian(sid){
  var s = stuById(sid);
  if(!s){ alert("학생 정보를 찾을 수 없습니다."); return; }
  var tel = firstPhone(s.phone);
  if(!tel){ alert(esc(s.name)+" 님의 연락처가 등록되어 있지 않습니다."); return; }
  var pretty = tel.length===11 ? tel.slice(0,3)+"-"+tel.slice(3,7)+"-"+tel.slice(7) : tel;
  if(confirm(s.name+" 보호자에게 전화할까요?\n\n"+pretty)){
    location.href = "tel:"+tel;
  }
}

/* ── 차량 제외: 출석은 했지만 그날 차량은 안 타는 경우 ──
   CAMP.busSkip[날짜][학생id] = 1 이면 그날 그 학생은 차량 제외 */
function BUSSKIP(){ if(!CAMP.busSkip) CAMP.busSkip={}; return CAMP.busSkip; }
function isBusSkip(sid,d){ var day=BUSSKIP()[d]; return !!(day&&day[sid]); }
function toggleBusSkip(sid,d){
  var bs=BUSSKIP(), day=bs[d]||{};
  if(day[sid]) delete day[sid]; else day[sid]=1;
  bs[d]=day; saveLocal(); render();
}

/* 특정 날짜에 한 노선이 실제로 태우는 인원 (결석·차량제외 뺀 수) */
function routeRideCount(rt, d){
  return rt.stops.filter(function(st){
    if(!st.sid || !stopRunsOn(st,d)) return false;
    var s=stuById(st.sid); if(!s || planOf(s).indexOf(d)<0) return false;
    if(attState(st.sid,d)===2) return false;   /* 결석 */
    if(isBusSkip(st.sid,d)) return false;       /* 차량 제외 */
    return true;
  }).length;
}

/* ---- 식사: 반찬 주문 · 금액 자동 계산 ----
   저장 형태: CAMP.meals[날짜] = { order:{ "카테고리|반찬명": 수량, ... }, note:"", cost:직접입력(선택) } */
function mealDay(d){ var m=CAMP.meals[d||UI.date]; if(!m) m={}; if(!m.pick) m.pick={}; return m; }

/* 하루 식비: 특식이면 (1인 단가 × 인원), 아니면 각 칸 (단가 × 수량) 합계.
   실제 지출액을 직접 입력하면 그 값이 우선. */
function mealTotal(d){
  var m=CAMP.meals[d]; if(!m) return 0;
  if(m.cost!==undefined && m.cost!=="" && m.cost!==null) return Number(m.cost)||0;
  if(m.special) return Math.round((Number(m.spPer)||0) * (Number(m.spCnt)||0));
  var sum=0;
  SLOTS.forEach(function(sl){
    var pk=m.pick[sl.key]; if(!pk||!pk.n) return;
    var it=findItem(pk.n); var price = (pk.p!==undefined&&pk.p!=="") ? Number(pk.p) : (it?Number(it.p)||0:0);
    sum += price * (Number(pk.q)||0);
  });
  return sum;
}
function mealAllTotal(){ var t=0; campDates().forEach(function(d){ t+=mealTotal(d); }); return t; }
function mealSummary(d){
  var m=CAMP.meals[d]; if(!m) return "";
  if(m.special) return "특식" + (m.spNote?" ("+m.spNote+")":"");
  if(!m.pick) return "";
  var out=[]; SLOTS.forEach(function(sl){ var pk=m.pick[sl.key]; if(pk&&pk.n) out.push(pk.n+(pk.q?" "+pk.q:"")); });
  return out.join(" · ");
}
function mealPeople(){ var t=0; campDates().forEach(function(d){ var m=CAMP.meals[d]; t += m ? (Number(m.people)||0) : 0; }); return t; }
/* 그날 배치된(오기로 한) 총 인원 — 식사 인원은 이 값을 자동 사용 */
function planCntAll(d){ return CAMP.students.filter(function(s){ return planOf(s).indexOf(d)>=0; }).length; }
function planPeopleAll(){ var t=0; campDates().forEach(function(d){ t+=planCntAll(d); }); return t; }
function campMealTotal(c,d){
  var m=c.meals[d]; if(!m) return 0;
  if(m.cost!==undefined && m.cost!=="" && m.cost!==null) return Number(m.cost)||0;
  if(m.special) return Math.round((Number(m.spPer)||0)*(Number(m.spCnt)||0));
  if(!m.pick) return 0;
  var sum=0;
  SLOTS.forEach(function(sl){ var pk=m.pick[sl.key]; if(!pk||!pk.n) return;
    var it=findItem(pk.n); var price=(pk.p!==undefined&&pk.p!=="")?Number(pk.p):(it?Number(it.p)||0:0);
    sum += price*(Number(pk.q)||0); });
  return sum;
}

function campCompareCard(){
  var cur=CAMP, rows=[];
  DB.camps.forEach(function(c,i){
    CAMP=c;                                  /* campDates 등이 CAMP를 보므로 잠시 교체 */
    var days=campDates().length;
    var reg=c.students.length;
    var plan=planPeopleAll();
    var att=0; Object.keys(c.att||{}).forEach(function(d){
      var day=c.att[d]; Object.keys(day).forEach(function(k){ if(day[k]===1) att++; }); });
    var rate = plan? Math.round(att/plan*100) : 0;
    var income=0; c.students.forEach(function(s){ income+=billOf(s).total; });
    var re=0;
    if(i>0){
      var prev=DB.camps[i-1].students;

      }).length;

    rows.push({name:c.set.name, days:days, reg:reg, plan:plan, att:att, rate:rate,

    '<span class="small">재등록률 = 바로 직전 캠프에도 참가했던 비율 · 출석률 = 출석 연인원 ÷ 배치 연인원</span></div>'+
    '<div style="overflow:auto"><table class="sheet" style="width:100%"><thead><tr>'+
    '<th class="lft">캠프</th><th>기간</th><th>등록</th><th>배치 연인원</th><th>출석 연인원</th>'+

      '<td>'+r.days+'일</td><td style="font-weight:800">'+r.reg+'명</td>'+
      '<td>'+r.plan+'</td><td style="color:var(--green);font-weight:700">'+(r.att||"–")+'</td>'+
      '<td style="font-weight:800;color:'+(r.rate>=90?'var(--green)':r.rate>0?'var(--amber)':'var(--sub)')+'">'+(r.att?r.rate+'%':'–')+'</td>'+
      '<td>'+(r.reRate===null?'–':r.re+'명')+'</td>'+
      '<td style="font-weight:800;color:var(--blue)">'+(r.reRate===null?'–':r.reRate+'%')+'</td>'+
      '<td style="text-align:right;font-weight:800">'+won(r.income)+'</td></tr>';
  });
  h+='</tbody></table></div>'+
     '<div class="small" style="margin-top:8px">· 현재 캠프의 출석 연인원·출석률은 캠프가 진행되면서 채워집니다. · 수입은 각 캠프의 청구 총액(조정 반영) 기준입니다.</div></div>';
  return h;

function exportCSV(){
  var e=function(v){ return '"'+String(v==null?"":v).replace(/"/g,'""')+'"'; };
  var ds=campDates(), R=[];
  R.push([CAMP.set.name+" 백업", new Date().toLocaleString("ko-KR")]); R.push([]);
  R.push(["[캠프생 명단]"]);
  R.push(["이름","학년","학교","성별","보호자","연락처","패키지","일수","할인구분","수업료","식비","차량구간","차량비","총액","탑승장소","탑승시간","메모"]);
  CAMP.students.forEach(function(s){
    var p=feeParts(s), bl="";
    BUS.forEach(function(b){ if(b[0]===s.bus) bl=b[1]; });
    R.push([s.name,s.grade,s.school,s.gender,s.guardian,s.phone,PKG[s.pkg].label,s.days,
      ((s.discLabel||((s.disc*100)+"%"))),
      p.tuition,p.meal,bl+(s.busHalf?" (형제50%)":""),p.bus,p.total,s.stop,s.time,s.memo]);
  });
  R.push([]); R.push(["[출석부]"]);
  ["A","B"].forEach(function(c){
    var lst=clsList(c); if(!lst.length) return;
    R.push([c+"반 ("+(c==="A"?"10시 체육→11시 영어":"10시 영어→11시 체육")+")"]);
    R.push(["번","이름","학년","차량"].concat(ds.map(fmtD)).concat(["출석계","등록","배치","보강"]));
    lst.forEach(function(s){
      var marks=ds.map(function(d){
        if(isHol(d)) return "휴";
        var st=attState(s.id,d);
        return st===1?1:st===2?"결":((s.plan||[]).indexOf(d)>=0?"·":"");
      });
      R.push([s.no||"",s.name,s.grade,(s.bus?"O":"")].concat(marks)
        .concat([actualCnt(s),s.days,plannedCnt(s),makeupCnt(s)]));
    });
    R.push(["","일자별 합계","",""].concat(ds.map(function(d){
      return isHol(d)?"휴일":lst.filter(function(s){ return attState(s.id,d)===1; }).length; })));
    R.push([]);
  });
  R.push([]); R.push(["[차량 운행표]"]);
  ROUTES().forEach(function(rt){
    R.push([rt.name, rt.dir]);
    R.push(["시간","승하차 장소","학년","이름"].concat(ds.map(fmtD)).concat(["탑승계"]));
    sortedStops(rt).forEach(function(o){
      var st=o.st;
      if(!st.name){ R.push([st.t,st.place]); return; }
      var dl=daysLabel(st);
      var marks=ds.map(function(d){
        if(!(st.sid && stopRunsOn(st,d))) return "";        /* 태우는 요일 아님 */
        var a=attState(st.sid,d);
        if(a===2) return "결";                               /* 결석 */
        if(isBusSkip(st.sid,d)) return "제외";               /* 차량 제외 */
        return a===1 ? 1 : "";                               /* 출석1 · 미체크 공백 */
      });
      R.push([st.t, st.place+(dl?" ["+dl+"]":""), st.grade, st.name]
        .concat(marks).concat([marks.filter(function(v){return v===1;}).length]));
    });
    R.push(["","","","탑승인원"].concat(ds.map(function(d){
      return rt.stops.filter(function(st){
        return st.sid && stopRunsOn(st,d) && attState(st.sid,d)===1 && !isBusSkip(st.sid,d); }).length; })));
    R.push([]);
  });
  R.push([]); R.push(["[식단표 · 식비]"]);
  R.push(["날짜","국","단백질 메인","나물/샐러드","마른/기타반찬","식사인원","식비","비고"]);
  ds.forEach(function(d){
    var m=CAMP.meals[d]||{};
    if(m.special){ R.push([fmtD(d),"특식 "+(m.spNote||""),"","","",(m.spCnt||attCnt(d)),mealTotal(d),(m.note||"")]); return; }
    var cell=function(k){ var pk=(m.pick||{})[k]; if(!pk||!pk.n) return "";
      return pk.n+(pk.q?" ("+pk.q+(pk.note?" / "+pk.note:"")+")":""); };
    R.push([fmtD(d),cell("soup"),cell("main"),cell("veg"),cell("side"),
            (m.people||attCnt(d)),mealTotal(d),(m.note||"")]);
  });
  R.push(["","","","","합계", mealPeople(), mealAllTotal(), ""]);
  R.push([]); R.push(["[캠프생 이력 · 영어레벨 추적]"]);
  R.push(["이름","생년월일","참가횟수","최근레벨","RL_ID","캠프별 기록"]);
  buildHistory().forEach(function(pp){
    R.push([pp.name, pp.birth, pp.recs.length, pp.level, pp.rlid,
      pp.recs.map(function(r){ return r.camp.set.name+" "+campAttended(r)+"일"+(r.s.level?" 레벨:"+r.s.level:"")+(r.s.rlid?" ID:"+r.s.rlid:""); }).join(" | ")]);
  });
  R.push([]); R.push(["[기타 지출]"]); R.push(["항목","금액"]);
  (DB.extra||[]).forEach(function(x){ R.push([x.n, Number(x.v)||0]); });
  R.push(["기타 지출 합계", extraTotal()]);
  R.push(["총 지출 (식비+기타)", mealAllTotal()+extraTotal()]);
  var csv="\uFEFF"+R.map(function(r){ return r.map(e).join(","); }).join("\n");
  var a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8"}));
  a.download=(CAMP.set.name||"캠프")+"_백업_"+todayStr()+".csv";
  a.click(); URL.revokeObjectURL(a.href);
}

function LT(){ if(!CAMP.lt) CAMP.lt=[]; return CAMP.lt; }
function ltCard(){
  var need=needLevel();

  var unass=need.filter(function(s){ return !assigned[s.id]; });
