<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0071E3">
<title>나라차태권도 출석</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap">
<style>
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; }
  :root{ --ink:#1D1D1F; --sub:#86868B; --line:#E5E5EA; --bg:#F5F5F7; --card:#FFFFFF;
    --blue:#0071E3; --blueDark:#0059B8; --blueSoft:#E5F0FC; --green:#34C759; --greenSoft:#E5F7EA; --red:#FF3B30; }
  body{ font-family:'Nanum Gothic',sans-serif; background:var(--bg); color:var(--ink);
    height:100vh; height:100dvh; overflow:hidden; display:flex; flex-direction:column;
    padding-top:env(safe-area-inset-top); padding-bottom:env(safe-area-inset-bottom); }
  .topbar{ background:var(--card); padding:14px 24px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; border-bottom:1px solid var(--line); }
  .topbar .brand{ display:flex; align-items:center; gap:11px; font-size:18px; font-weight:800; }
  .topbar .brand img{ width:40px; height:40px; object-fit:contain; }
  .topbar .now .time{ font-size:20px; font-weight:800; text-align:right; }
  .topbar .now .date{ font-size:11.5px; color:var(--sub); text-align:right; }
  .classbar{ background:var(--blueSoft); color:var(--blue); padding:12px 24px; font-size:14.5px; font-weight:800; flex-shrink:0; text-align:center; }
  .classbar.off{ background:#FFF3E0; color:#B45309; }
  .stage{ flex:1; display:flex; align-items:center; justify-content:center; padding:22px; overflow:hidden; }
  .panel{ width:100%; max-width:480px; }
  .lead{ text-align:center; margin-bottom:22px; }
  .lead h1{ font-size:28px; font-weight:800; letter-spacing:-.5px; }
  .lead p{ font-size:15px; color:var(--sub); margin-top:8px; font-weight:700; }
  .lead p b{ color:var(--blue); }
  .pin{ display:flex; gap:12px; justify-content:center; margin-bottom:24px; }
  .pin .dot{ width:56px; height:66px; border-radius:15px; background:var(--card); border:2px solid var(--line);
    display:flex; align-items:center; justify-content:center; font-size:28px; color:var(--blue); transition:all .12s; }
  .pin .dot.filled{ border-color:var(--blue); background:var(--blueSoft); }
  .pad{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
  .key{ height:70px; border-radius:17px; border:none; background:var(--card); font-family:inherit;
    font-size:29px; font-weight:800; color:var(--ink); cursor:pointer;
    box-shadow:0 2px 0 #DAD9DE, 0 4px 10px rgba(0,0,0,.05); transition:transform .08s, box-shadow .08s; }
  .key:active{ transform:translateY(2px); box-shadow:0 0 0 #DAD9DE; background:#FAFAFB; }
  .key.del{ color:var(--sub); font-size:24px; }
  .key.clr{ color:var(--sub); font-size:18px; }
  .errmsg{ text-align:center; color:var(--red); font-size:15px; font-weight:800; margin-top:14px; min-height:20px; }
  .confirm-lead{ text-align:center; margin-bottom:20px; }
  .confirm-lead h1{ font-size:24px; font-weight:800; }
  .confirm-lead p{ font-size:14px; color:var(--sub); margin-top:6px; font-weight:700; }
  .facegrid{ display:flex; flex-direction:column; gap:12px; max-height:60vh; overflow:auto; }
  .facecard{ display:flex; align-items:center; gap:16px; background:var(--card); border:2px solid var(--line);
    border-radius:18px; padding:12px 16px; cursor:pointer; box-shadow:0 2px 0 #E5E4E9; transition:transform .08s, box-shadow .08s, border-color .12s; }
  .facecard:active{ transform:translateY(2px); box-shadow:0 0 0 #E5E4E9; border-color:var(--blue); }
  .facecard .photo{ width:80px; height:80px; border-radius:14px; object-fit:cover; flex-shrink:0; background:#EDEDF0;
    display:flex; align-items:center; justify-content:center; font-size:34px; color:#B0B0B8; }
  .facecard .info{ flex:1; text-align:left; }
  .facecard .info .nm{ font-size:23px; font-weight:800; }
  .facecard .info .cls{ font-size:13.5px; color:var(--sub); margin-top:3px; font-weight:700; }
  .facecard .tap{ font-size:14px; color:#fff; font-weight:800; background:var(--blue); padding:9px 15px; border-radius:11px; box-shadow:0 2px 0 var(--blueDark); }
  .done{ text-align:center; display:flex; flex-direction:column; align-items:center; }
  .done .photo-big{ width:128px; height:128px; border-radius:26px; object-fit:cover; margin:0 0 18px;
    border:4px solid var(--greenSoft); background:#EDEDF0; display:flex; align-items:center; justify-content:center; font-size:56px; color:#B0B0B8;
    box-shadow:0 8px 22px rgba(52,199,89,.2); animation:pop .45s cubic-bezier(.2,1.4,.5,1); }
  @keyframes pop{ 0%{transform:scale(.4);opacity:0;} 100%{transform:scale(1);opacity:1;} }
  .done .badge{ display:inline-flex; align-items:center; gap:6px; background:var(--greenSoft); color:var(--green);
    font-size:16px; font-weight:800; padding:7px 16px; border-radius:20px; margin-bottom:12px; }
  .done h1{ font-size:32px; font-weight:800; }
  .done p{ font-size:15px; color:var(--sub); margin-top:10px; font-weight:700; }
  .done .cls2{ display:inline-block; margin-top:16px; background:var(--blueSoft); color:var(--blue);
    padding:10px 18px; border-radius:13px; font-size:14.5px; font-weight:800; }
  .backbtn{ display:block; margin:20px auto 0; background:var(--card); border:2px solid var(--line);
    border-radius:14px; color:var(--sub); font-family:inherit; font-size:15px; font-weight:800; cursor:pointer; padding:12px 24px; box-shadow:0 2px 0 #E5E4E9; }
  .shake{ animation:shake .4s; } @keyframes shake{ 0%,100%{transform:translateX(0);} 20%,60%{transform:translateX(-8px);} 40%,80%{transform:translateX(8px);} }
  /* 접속키/로딩 화면 */
  .setup{ max-width:400px; margin:auto; padding:26px; background:var(--card); border-radius:18px; text-align:center; }
  .setup img{ width:120px; margin-bottom:14px; }
  .setup h1{ font-size:22px; font-weight:800; margin-bottom:6px; }
  .setup p{ font-size:14px; color:var(--sub); margin-bottom:18px; }
  .setup input{ width:100%; padding:14px; border:2px solid var(--line); border-radius:12px; font-size:16px; font-family:inherit; text-align:center; margin-bottom:12px; }
  .setup button{ width:100%; padding:15px; background:var(--blue); color:#fff; border:none; border-radius:12px; font-size:17px; font-weight:800; font-family:inherit; cursor:pointer; }
  .spin{ width:44px; height:44px; border:4px solid var(--line); border-top-color:var(--blue); border-radius:50%; margin:20px auto; animation:rot 1s linear infinite; }
  @keyframes rot{ to{transform:rotate(360deg);} }
  #fsBtn{ position:fixed; right:14px; bottom:14px; z-index:100; background:var(--ink); color:#fff; border:none; border-radius:13px; padding:11px 16px; font-family:inherit; font-size:13px; font-weight:800; cursor:pointer; }

  /* ══════════ 가로·세로 자동 대응 ══════════ */
  /* 화면 높이가 낮을 때(주로 폰 가로): 요소를 줄여 키패드가 안 잘리게 */
  @media (max-height:560px){
    .topbar{ padding:8px 18px; }
    .topbar .brand{ font-size:15px; gap:8px; }
    .topbar .brand img{ width:30px; height:30px; }
    .topbar .now .time{ font-size:16px; }
    .topbar .now .date{ font-size:10px; }
    .classbar{ padding:7px 18px; font-size:12.5px; }
    .stage{ padding:10px 16px; }
    .lead{ margin-bottom:12px; }
    .lead h1{ font-size:21px; }
    .lead p{ font-size:13px; margin-top:5px; }
    .pin{ gap:9px; margin-bottom:13px; }
    .pin .dot{ width:42px; height:48px; border-radius:11px; font-size:22px; }
    .pad{ gap:8px; }
    .key{ height:48px; border-radius:13px; font-size:22px; }
    .key.del{ font-size:19px; } .key.clr{ font-size:15px; }
    .errmsg{ font-size:13px; margin-top:9px; min-height:16px; }
    .done .photo-big{ width:84px; height:84px; border-radius:18px; margin-bottom:11px; font-size:38px; }
    .done .badge{ font-size:14px; padding:5px 13px; margin-bottom:8px; }
    .done h1{ font-size:24px; } .done p{ font-size:13px; margin-top:6px; }
    .done .cls2{ margin-top:10px; padding:7px 14px; font-size:13px; }
    .facecard .photo{ width:58px; height:58px; }
    .facecard .info .nm{ font-size:19px; }
    .facegrid{ max-height:52vh; }
    .backbtn{ margin-top:12px; padding:9px 20px; font-size:13px; }
  }
  /* 아주 낮은 화면(작은 폰 가로): 한 번 더 축소 */
  @media (max-height:420px){
    .classbar{ padding:5px 16px; font-size:11.5px; }
    .stage{ padding:6px 14px; }
    .lead{ margin-bottom:8px; }
    .lead h1{ font-size:18px; } .lead p{ font-size:11.5px; margin-top:3px; }
    .pin{ gap:7px; margin-bottom:9px; }
    .pin .dot{ width:36px; height:40px; font-size:18px; }
    .pad{ gap:6px; }
    .key{ height:40px; font-size:19px; border-radius:11px; }
    .done .photo-big{ width:66px; height:66px; margin-bottom:8px; font-size:30px; }
    .done h1{ font-size:20px; }
  }
  /* 가로 모드에서 확인(사진 선택) 화면은 2칸으로 — 넘침 방지 */
  @media (orientation:landscape) and (max-height:560px){
    .facegrid{ display:grid; grid-template-columns:1fr 1fr; gap:9px; max-height:56vh; }
    .facecard{ padding:9px 12px; }
  }
</style>

<script>
/* 전체화면 시 방향을 잠그지 않음 — 기기를 돌리면 가로·세로 자유롭게 전환.
   일부 브라우저가 전체화면에서 자동으로 방향을 잠그면, 명시적으로 해제 시도 */
function unlockOrientation(){
  try{
    if(screen.orientation && screen.orientation.unlock){ screen.orientation.unlock(); }
  }catch(e){}
}
</script>
</head>

<script>
var GSHEET_URL="https://script.google.com/macros/s/AKfycbysx2hkGfv3onXQHutPA6boYIZ74R4MNY_Jrc5cwgVebI9L1FRmj0YLT9YpYrS0tKVg7A/exec";
var DAY_CODE=["sun","mon","tue","wed","thu","fri","sat"];
var DAY_IDX={mon:0,tue:1,wed:2,thu:3,fri:4,sat:5};
var DAY_KO={mon:"월",tue:"화",wed:"수",thu:"목",fri:"금",sat:"토",sun:"일"};

var S={
  key:"", loaded:false, screen:"setup", pin:"",
  students:[], schedule:null, weeks:{}, photoMap:{},
  tailIndex:{}, guardTailIndex:{},
  matches:null, chosen:null, curSlot:null, curClassLabel:"", err:"",
  attState:null, pushTimer:null
};

/* ── 날짜 유틸 ── */
function p2(n){ return String(n).padStart(2,"0"); }
function todayStr(){ var d=new Date(); return d.getFullYear()+"-"+p2(d.getMonth()+1)+"-"+p2(d.getDate()); }
function fmtYmd(d){ return d.getFullYear()+"-"+p2(d.getMonth()+1)+"-"+p2(d.getDate()); }
function mondayOf(dstr){ var d=new Date(dstr+"T00:00:00"); var w=d.getDay(); var diff=(w===0?-6:1-w); d.setDate(d.getDate()+diff); return fmtYmd(d); }
function curWeek(){ return mondayOf(todayStr()); }

/* ── 접속키 저장/로드 ── */
try{ S.key=localStorage.getItem("naracha-kiosk-key")||""; }catch(e){}

/* ── 데이터 로드 (att + photo 창고) ── */
function loadAll(){
  S.screen="loading"; render();
  var okAtt=false, okPhoto=false, done=0;
  function finish(){ done++; if(done>=2){ if(okAtt){ buildIndex(); S.loaded=true; S.screen="pad"; updateClass(); render(); } else { S.screen="setup"; S.err="접속키가 맞지 않거나 데이터를 불러올 수 없어요"; render(); } } }
  // att 창고 (명단·시간표·출석)
  fetch(GSHEET_URL+"?key="+encodeURIComponent(S.key)+"&store=att")
    .then(function(r){ return r.json(); })
    .then(function(rows){
      if(rows && rows.error){ finish(); return; }
      var m=parseRows(rows);
      if(m && m.attV){
        S.students=(m.roster&&m.roster.list)||[];
        S.schedule=m.schedule||null;
        S.weeks=m.weeks||{};
        S.closedMap=(m.closedMapAtt&&m.closedMapAtt.map)||{};
        S.quitMap=(m.quitMapAtt&&m.quitMapAtt.map)||{};
        S.accMap=m.acc&&m.acc.map||{};
        S.attRaw=m;
        okAtt=true;
      }
      finish();
    })
    .catch(function(){ finish(); });
  // photo 창고
  fetch(GSHEET_URL+"?key="+encodeURIComponent(S.key)+"&store=photo")
    .then(function(r){ return r.json(); })
    .then(function(rows){
      if(rows && !rows.error){
        var m=parseRows(rows);
        if(m && m.photoV){ S.photoMap=m.map||{}; okPhoto=true; }
      }
      finish();
    })
    .catch(function(){ finish(); });
}
function parseRows(rows){
  if(!rows || rows.length<2) return null;
  var joined="";
  for(var i=0;i<rows.length;i++){
    if(rows[i][0]==="JSON" && i+1<rows.length){
      for(var j=i+1;j<rows.length;j++) joined+=(rows[j][0]!=null?String(rows[j][0]):"");
      break;
    }
  }
  try{ return JSON.parse(joined); }catch(e){ return null; }
}

/* ── 뒷4자리 색인 (빠른 검색) ── */
function isActive(name){ return !(S.closedMap&&S.closedMap[name]) && !(S.quitMap&&S.quitMap[name]&&!S.quitMap[name].del); }
function buildIndex(){
  S.tailIndex={};
  S.students.forEach(function(s){
    if(!isActive(s.n)) return;
    var tails={};
    (s.gd||[]).forEach(function(g){
      var digits=(g.p||"").replace(/[^0-9]/g,"");
      if(digits.length>=4){ tails[digits.slice(-4)]=1; }
    });
    // 본인 폰도 색인에 (있으면)
    var sp=(s.sp||"").replace(/[^0-9]/g,"");
    if(sp.length>=4) tails[sp.slice(-4)]=1;
    Object.keys(tails).forEach(function(t){
      if(!S.tailIndex[t]) S.tailIndex[t]=[];
      S.tailIndex[t].push(s.n);
    });
  });
}

/* ── 지금 시간 수업 슬롯 자동 감지 ── */
function updateClass(){
  var now=new Date();
  var dayCode=DAY_CODE[now.getDay()];
  var nowMin=now.getHours()*60+now.getMinutes();   // 지금을 '분'으로
  var cells=(S.schedule&&S.schedule.cells)||{};
  /* 수업 시작 40분 전 ~ 30분 후 안에 들어오는 수업 중, 시작시각이 가장 가까운 것 */
  var best=null, bestDiff=1e9, bestH=-1;
  for(var k in cells){
    var parts=k.split("-");
    if(parts[0]!==dayCode) continue;
    if(!cells[k] || !cells[k].l) continue;
    var kh=parseInt(parts[1],10);
    var startMin=kh*60;
    var diff=nowMin-startMin;             // 양수=수업 시작 지남, 음수=아직 전
    if(diff>=-40 && diff<=30){            // 40분 전 ~ 30분 후
      var absd=Math.abs(diff);
      if(absd<bestDiff){ bestDiff=absd; best=k; bestH=kh; }
    }
  }
  if(best){
    S.curSlot=best; S.curClassLabel=cells[best].l;
  } else {
    S.curSlot=null; S.curClassLabel="";
  }
  var bar=document.getElementById("classbar");
  if(bar){
    if(best){
      bar.className="classbar";
      bar.textContent="📍 지금 수업 — "+bestH+":00 "+cells[best].l;
    } else {
      bar.className="classbar off";
      bar.textContent="⚠️ 지금은 수업 시간이 아니에요";
    }
  }
}
/* 그 아이가 지금 배치된 '연속' 수업 슬롯들 찾기 (지도진이 배치한 인접 칸) */
function findAttendSlots(name){
  if(!S.curSlot) return [];
  var wk=curWeek();
  var w=S.weeks[wk]; if(!w) w={cells:{}};
  var parts=S.curSlot.split("-");
  var day=parts[0], baseH=parseInt(parts[1],10);
  var cells=(S.schedule&&S.schedule.cells)||{};
  /* 이 아이가 배치된 칸인지 확인: 시간표 명단(schedule)이 아니라
     주간 배치(weeks.cells.lv)에 이름이 있는지로 판단 (지도진이 배치한 것) */
  function placedIn(h){
    var key=day+"-"+h;
    var c=w.cells&&w.cells[key];
    if(!c || !c.lv) return false;
    for(var i=0;i<3;i++){ if(c.lv[i] && c.lv[i].indexOf(name)>-1) return true; }
    return false;
  }
  var slots=[];
  /* 지금 수업 칸에 지도진이 배치했을 때만 출석 가능.
     배치 안 됐으면 빈 배열 → 출석 거절 (신규 배치는 만들지 않음) */
  var anyPlaced=placedIn(baseH);
  if(anyPlaced){
    /* 위·아래로 연속으로 배치된 칸 모두 모음 */
    slots.push(day+"-"+baseH);
    for(var h=baseH+1; h<=23; h++){ if(placedIn(h)) slots.push(day+"-"+h); else break; }
    for(var h2=baseH-1; h2>=0; h2--){ if(placedIn(h2)) slots.unshift(day+"-"+h2); else break; }
  }
  /* 배치 안 된 아이 → 빈 배열 (choose에서 거절 처리) */
  return slots;
}

/* 이미 출석했는지 확인 (같은 수업 기준) — 배치된 슬롯 중 하나라도 이미 출석이면 true */
/* 본인이 이미 단말기로 눌렀는지 확인 (지도진 출석은 차단 대상 아님)
   → 아이가 눌렀을 때 by:"self"로 저장. 그게 이미 있으면 진짜 중복. */
function alreadyAttended(name){
  var slots=findAttendSlots(name);
  if(!slots.length) return false;
  var wk=curWeek(); var w=S.weeks[wk]; if(!w) return false;
  for(var i=0;i<slots.length;i++){
    var c=w.cells&&w.cells[slots[i]];
    var mk=c&&c.marks&&c.marks[name];
    // '본인이 직접 누른(self)' 출석이 이미 있을 때만 중복으로 봄
    if(mk && mk.s==="출석" && mk.by==="self") return true;
  }
  return false;
}
/* ── 출석 처리: 배치된 연속 수업 모두 한 번에 출석 ── */
function markAttendance(name){
  var wk=curWeek();
  if(!S.weeks[wk]) S.weeks[wk]={t:0, cells:{}};
  var w=S.weeks[wk];
  /* 지도진이 배치한 슬롯만 반환됨. 배치 없으면 choose에서 이미 거절되어
     여기까지 오지 않지만, 방어적으로 한 번 더 확인 */
  var slots=findAttendSlots(name);
  if(!slots.length){ return 0; }
  var markedCount=0;
  slots.forEach(function(slot){
    /* 배치된 칸은 이미 존재함. 방어적으로 없으면 생성하되 lv는 지도진 배치를 존중 */
    if(!w.cells[slot]) w.cells[slot]={lv:[[],[],[]], marks:{}};
    var cell=w.cells[slot];
    if(!cell.marks) cell.marks={};
    var prev=cell.marks[name]||{};
    var wasAttended=prev.s==="출석";   // 이미 출석 상태였나 (지도진이든 본인이든)
    /* 본인이 눌렀음을 표시(by:self). 지도진이 미리 찍었어도 self로 승격.
       lv(배치)는 건드리지 않음 — 지도진이 이미 배치한 상태이므로 그대로 둠 */
    cell.marks[name]={ s:"출석", k:prev.k, m:prev.m||"", t:Date.now(), by:"self" };
    /* 누적 횟수 +1 (심사용) — 이 수업에 '출석' 상태가 아예 없었을 때만.
       지도진이 이미 출석 찍어둔 칸이면 누적은 그대로 (이중 카운트 방지) */
    if(!wasAttended){
      if(!S.accMap) S.accMap={};
      S.accMap[name]=(S.accMap[name]||0)+1;
      markedCount++;
    }
  });
  w.t=Date.now();
  S.lastMarkedSlots=slots;   // 완료화면 표시용
  schedulePush();
  return markedCount;
}

/* 여러 명이 몰릴 때: 마지막 출석 후 살짝 모아서 한 번에 push */
function schedulePush(){
  clearTimeout(S.pushTimer);
  S.pushTimer=setTimeout(pushAtt, 1200);
}
function pushAtt(){
  if(!S.key || !S.attRaw) return;
  // att 원본에 갱신된 weeks·acc 반영
  S.attRaw.weeks=S.weeks;
  if(S.accMap){ if(!S.attRaw.acc) S.attRaw.acc={map:{},t:0}; S.attRaw.acc.map=S.accMap; S.attRaw.acc.t=Date.now(); }
  S.attRaw.savedAt=Date.now();
  // 서버 것 먼저 합치기(다른 기기 출석 유실 방지)는 관리 프로그램이 처리.
  // 키오스크는 안전하게: 서버 pull → 병합 → push
  fetch(GSHEET_URL+"?key="+encodeURIComponent(S.key)+"&store=att")
    .then(function(r){ return r.json(); })
    .then(function(rows){
      var remote=parseRows(rows);
      if(remote && remote.weeks){
        // 주간 marks 병합: 서버 것 + 내 것 (t 큰 쪽 우선)
        mergeWeeksInto(remote.weeks, S.weeks);
        S.weeks=remote.weeks;
        S.attRaw=remote;
        S.attRaw.weeks=S.weeks;
        if(S.accMap){ if(!S.attRaw.acc)S.attRaw.acc={map:{},t:0};
          // 누적은 서버와 이름별 최대
          var sm=(remote.acc&&remote.acc.map)||{};
          for(var nm in S.accMap){ sm[nm]=Math.max(sm[nm]||0, S.accMap[nm]); }
          S.attRaw.acc.map=sm; S.accMap=sm;
        }
      }
      var s=JSON.stringify(S.attRaw);
      var rows2=[["JSON"]];
      for(var i=0;i<s.length;i+=45000) rows2.push([s.slice(i,i+45000)]);
      return fetch(GSHEET_URL,{method:"POST",body:JSON.stringify({key:S.key,store:"att",rows:rows2})});
    })
    .then(function(r){ return r.text(); })
    .catch(function(){ /* 오프라인이어도 로컬엔 남아있음. 다음 출석 때 재시도 */ });
}
/* 주간 marks 병합: src의 각 셀 marks를 dst에 t 우선으로 */
function mergeWeeksInto(dst, src){
  for(var wk in src){
    if(!dst[wk]){ dst[wk]=src[wk]; continue; }
    var sc=src[wk].cells||{}, dc=dst[wk].cells||{};
    if(!dst[wk].cells) dst[wk].cells={};
    for(var ck in sc){
      if(!dc[ck]){ dst[wk].cells[ck]=sc[ck]; continue; }
      var sm=sc[ck].marks||{}, dm=dc[ck].marks||{};
      for(var nm in sm){ if(!dm[nm] || (sm[nm].t||0)>(dm[nm].t||0)) dm[nm]=sm[nm]; }
      // lv 합치기
      for(var i=0;i<3;i++){ (sc[ck].lv&&sc[ck].lv[i]||[]).forEach(function(n){ if(dc[ck].lv[i].indexOf(n)<0) dc[ck].lv[i].push(n); }); }
    }
    dst[wk].t=Math.max(dst[wk].t||0, src[wk].t||0);
  }
}

/* ── 소리 ── */
function playChime(){
  try{ var AC=window.AudioContext||window.webkitAudioContext; var ctx=window.__ac||(window.__ac=new AC()); if(ctx.state==="suspended")ctx.resume();
    [{f:880,t:0},{f:1318,t:0.13}].forEach(function(n){ var o=ctx.createOscillator(),g=ctx.createGain(); o.type="sine"; o.frequency.value=n.f; o.connect(g); g.connect(ctx.destination);
      var st=ctx.currentTime+n.t; g.gain.setValueAtTime(0,st); g.gain.linearRampToValueAtTime(0.35,st+0.02); g.gain.exponentialRampToValueAtTime(0.001,st+0.45); o.start(st); o.stop(st+0.5); });
  }catch(e){}
}
/* 오류음: 낮은 '두-' 두 번 (이미 출석/오류) */
function playError(){
  try{ var AC=window.AudioContext||window.webkitAudioContext; var ctx=window.__ac||(window.__ac=new AC()); if(ctx.state==="suspended")ctx.resume();
    [{f:330,t:0},{f:262,t:0.18}].forEach(function(n){ var o=ctx.createOscillator(),g=ctx.createGain(); o.type="sine"; o.frequency.value=n.f; o.connect(g); g.connect(ctx.destination);
      var st=ctx.currentTime+n.t; g.gain.setValueAtTime(0,st); g.gain.linearRampToValueAtTime(0.3,st+0.02); g.gain.exponentialRampToValueAtTime(0.001,st+0.35); o.start(st); o.stop(st+0.4); });
  }catch(e){}
}

      (S.rejectSub?'<div class="cls2" style="background:#FFEBEE;color:#C62828">'+S.rejectSub+'</div>':'')+
      '</div>';
    clearTimeout(window.__t); window.__t=setTimeout(reset,3200);
  }
}

/* ── 동작 ── */
window.submitKey=function(){
  var v=document.getElementById("keyIn").value.trim();
  if(!v){ S.err="접속키를 입력해주세요"; render(); return; }
  S.key=v; try{ localStorage.setItem("naracha-kiosk-key", v); }catch(e){}
  S.err=""; loadAll();
};
window.press=function(n){ if(S.pin.length>=4)return; S.pin+=n; render(); if(S.pin.length===4){ submitPin(); } };
window.del=function(){ S.pin=S.pin.slice(0,-1); render(); };
window.clearAll=function(){ S.pin=""; S.err=""; render(); };
window.reset=function(){ S.pin=""; S.screen="pad"; S.matches=null; S.chosen=null; S.err=""; S.rejectMsg=""; S.rejectSub=""; updateClass(); render(); };
window.submitPin=function(){
  var names=S.tailIndex[S.pin]||[];
  if(names.length===0){ S.err="일치하는 수련생이 없어요. 다시 확인해주세요"; S.pin=""; render(); return; }
  S.matches=names; S.screen="confirm"; render();
};
window.choose=function(i){
  var nm=S.matches[i];
  S.chosen=nm;
  // 1) 지금이 수업 시간(40분전~30분후)이 아니면 거절
  if(!S.curSlot){
    S.rejectMsg="지금은 수업 시간이 아니에요";
    S.rejectSub="수업 시작 40분 전부터 출석할 수 있어요";
    S.screen="reject";
    render(); playError();
    return;
  }
  // 2) 지도진이 이 수업에 배치하지 않은 아이면 거절
  var slots=findAttendSlots(nm);
  if(!slots.length){
    S.rejectMsg="오늘 이 수업에 배치되어 있지 않아요";
    S.rejectSub="사범님께 말씀해 주세요";
    S.screen="reject";
    render(); playError();
    return;
  }
  // 3) 이미 출석했으면 중복 차단 (같은 수업 기준)
  if(alreadyAttended(nm)){
    S.screen="already";
    render();
    playAlreadyDone();
    return;
  }
  markAttendance(nm);   // 즉시 로컬 반영 (연속 수업 모두)
  S.screen="done";
  render();
  playDone();
};

/* ── 전체화면·시계 ── */
function goFullscreen(){ var el=document.documentElement; var r=el.requestFullscreen||el.webkitRequestFullscreen; if(r){ r.call(el).then(function(){ unlockOrientation(); }).catch(function(){ unlockOrientation(); }); } else { unlockOrientation(); } }
document.addEventListener("click",function o(){ goFullscreen(); document.removeEventListener("click",o); },{once:true});
function tick(){
  var d=new Date();
  var c=document.getElementById("clock"); if(c) c.textContent=p2(d.getHours())+":"+p2(d.getMinutes());
  var dl=document.getElementById("dateLbl"); if(dl) dl.textContent=(d.getMonth()+1)+"월 "+d.getDate()+"일 ("+DAY_KO[DAY_CODE[d.getDay()]]+")";
}
setInterval(tick,1000); tick();
setInterval(function(){ if(S.loaded && S.screen==="pad") updateClass(); }, 60000);  // 1분마다 수업 갱신

/* 화면을 가로↔세로로 돌리면 레이아웃 다시 계산 */
window.addEventListener("orientationchange", function(){ setTimeout(function(){ if(typeof render==="function") render(); }, 200); });
window.addEventListener("resize", function(){ if(typeof render==="function") render(); });

/* ── 시작 ── */
if(S.key){ loadAll(); } else { render(); }
</script>
